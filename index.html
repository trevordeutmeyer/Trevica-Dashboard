<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Deutmeyer Family Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #030712;
  --app: #0b0f19;
  --card: rgba(22, 30, 49, 0.85);
  --card-soft: rgba(30, 41, 59, 0.5);
  --text: #94a3b8;
  --text-strong: #f8fafc;
  --muted: #475569;
  --border: rgba(255, 255, 255, 0.08);
  --border-soft: rgba(255, 255, 255, 0.03);
  --blue: #38bdf8;
  --blue-soft: rgba(56, 189, 248, 0.15);
  --green: #4ade80;
  --green-soft: rgba(74, 222, 128, 0.15);
  --amber: #fbbf24;
  --amber-soft: rgba(251, 191, 36, 0.15);
  --red: #f87171;
  --red-soft: rgba(248, 113, 113, 0.15);
  --purple: #c084fc;
  --purple-soft: rgba(192, 132, 252, 0.18);
  --shadow: 0 20px 40px rgba(0,0,0,0.5);
  --radius: 24px;
  --radius-sm: 16px;
  --dad: #4ade80;
  --mom: #f87171;
  --jules: #38bdf8;
  --henry: #f97316;
  --cal-filter: invert(0.92) hue-rotate(180deg) contrast(1.25);
}

* { box-sizing: border-box; touch-action: manipulation; user-select: none; }
html, body { height: 100vh; overflow: hidden; margin: 0; background: var(--bg); }
body { font-family: 'Plus Jakarta Sans', Arial, sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }

/* Main Full-Screen Layout Wrapper (Eliminates Scrollbars) */
.app-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 1600px;
  margin: 0 auto;
  background: var(--app);
  padding: 0 16px;
}

/* Header Area */
.topbar {
  padding: 16px 12px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
.main-title-headline { margin: 0; color: var(--text-strong); font-size: 26px; font-weight: 800; letter-spacing: -0.04em; }

.dock-container { display: inline-flex; background: var(--card-soft); border: 1px solid var(--border); padding: 4px; border-radius: 16px; }
.nav-tab {
  appearance: none; border: none; background: transparent; color: var(--text); border-radius: 12px;
  padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s ease;
}
.nav-tab.active { background: var(--app); color: var(--blue); box-shadow: var(--shadow); }

.time-block { text-align: right; }
#clock { color: var(--text-strong); font-size: 28px; font-weight: 800; line-height: 1; }
#date { color: var(--text); font-size: 12px; font-weight: 600; margin-top: 2px; }

/* Dynamic Announcement Bar */
.smart-banner {
  flex-shrink: 0;
  margin: 12px 12px 0;
  padding: 14px 20px;
  border-radius: var(--radius-sm);
  background: var(--card-soft);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  color: var(--text-strong);
}
.smart-banner.alert-active {
  background: linear-gradient(90deg, var(--purple-soft), rgba(124, 58, 237, 0.4));
  border-color: var(--purple);
  box-shadow: 0 0 20px rgba(192, 132, 252, 0.2);
}

.content { flex: 1; min-height: 0; padding: 16px 12px 24px; position: relative; }
.panel { display: none; height: 100%; }
.panel.active { display: flex; flex-direction: column; }

/* Split Screen Content Matrix */
.today-master-layout {
  display: grid;
  grid-template-columns: 1fr;
  height: 100%;
  gap: 16px;
}
@media (min-width: 1024px) {
  .today-master-layout { grid-template-columns: 0.85fr 1.15fr; }
}

/* Left Column: Calendar Box */
.calendar-card-box { display: flex; flex-direction: column; height: 100%; }
.calendar-frame-wrap { flex: 1; min-height: 0; background: var(--app); position: relative; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.calendar-frame-wrap iframe { width: 100%; height: 100%; border: 0; filter: var(--cal-filter); }

/* Right Column: Interactive Core Feed */
.main-tracking-core { display: flex; flex-direction: column; height: 100%; min-height: 0; }
.scroll-payload-box { flex: 1; min-height: 0; overflow-y: auto; padding-right: 6px; }

/* Large High-Contrast Row Elements */
.chore-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 16px;
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  min-height: 60px;
  background: var(--card-soft);
  margin-bottom: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.chore-row:hover { border-color: var(--border); transform: translateY(-2px); background: var(--card); }
.chore-row:active { transform: scale(0.98); }
.chore-row.done { opacity: 0.35; }
.chore-row.done .chore-name { text-decoration: line-through; }

.chk {
  width: 28px;
  height: 28px;
  border-radius: 9px;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: white;
  background: rgba(0,0,0,0.02);
}
.chore-row.done .chk { background: var(--person, var(--blue)); border-color: var(--person, var(--blue)); }
.chore-name { font-size: 16px; font-weight: 700; color: var(--text-strong); }

.list-label { font-size: 12px; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: 0.08em; padding: 12px 4px 6px; display: flex; align-items: center; justify-content: space-between; }
.p-widget-streak { font-size: 11px; background: linear-gradient(135deg, #ff9800, #ff5722); color: #ffffff; padding: 3px 10px; border-radius: 8px; font-weight: 800; box-shadow: 0 4px 10px rgba(255, 87, 34, 0.2); }

/* Quick Summary Statistics Header Strip */
.quick-stats-stack { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; flex-shrink: 0; }
.stat-mini { background: var(--card-soft); padding: 12px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border-soft); text-align: center; }
.stat-m-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; }
.stat-m-val { font-size: 22px; font-weight: 800; color: var(--text-strong); margin-top: 2px; }

/* Floating Plus Pop-up Setup */
.floating-action-node {
  position: absolute; right: 20px; bottom: 20px; width: 56px; height: 56px; border-radius: 99px;
  background: var(--blue); color: white; border: none; font-size: 26px; font-weight: 700;
  box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3); z-index: 100;
}
.overlay-glass-container {
  display: none; position: fixed; inset: 0; background: rgba(2, 4, 8, 0.65);
  backdrop-filter: blur(20px); z-index: 999; align-items: center; justify-content: center; padding: 20px;
}
.overlay-glass-container.open { display: flex; }
.overlay-card { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: var(--radius); width: 100%; max-width: 420px; box-shadow: var(--shadow); }

/* Panel Scroll Containers */
.panel-scroll-frame { flex: 1; min-height: 0; overflow-y: auto; padding-right: 4px; }
.chores-layout-box { display: grid; grid-template-columns: 1fr; gap: 16px; }
@media(min-width: 768px) { .chores-layout-box { grid-template-columns: repeat(2, 1fr); } }

.approval-list { display: grid; gap: 12px; }
.approval-item { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center; }
.history-manifest-card { background: var(--card-soft); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 18px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.manage-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
@media(min-width: 768px) { .manage-grid { grid-template-columns: repeat(2, 1fr); } }

.field-row { display: grid; grid-template-columns: 1fr 110px; gap: 12px; align-items: center; padding-bottom: 12px; border-bottom: 1px solid var(--border-soft); margin-bottom: 12px; }
.inp { border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 12px; padding: 12px; font-size: 15px; outline: none; width: 100%; }
.add-form { margin-top: 14px; background: var(--card-soft); padding: 12px; border-radius: var(--radius-sm); display: grid; gap: 10px; }
.type-row { display: flex; gap: 10px; }
.type-btn { flex: 1; border: 1px solid var(--border); background: var(--card); color: var(--muted); padding: 10px; border-radius: 10px; font-weight: 700; font-size: 13px; }
.type-btn.selected { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
.add-btn { border: none; background: var(--text-strong); color: var(--app); border-radius: 10px; padding: 12px; font-weight: 700; }
.del-btn { border: none; background: var(--red-soft); color: var(--red); width: 32px; height: 32px; border-radius: 8px; font-weight: 700; }
.manage-chore-row { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-soft); }

.modal-bg { display:none; position:fixed; inset:0; background:rgba(15,23,42,.7); backdrop-filter: blur(16px); z-index:200; align-items:center; justify-content:center; padding: 20px; }
.modal-bg.open { display:flex; }
.modal { background:var(--card); border:1px solid var(--border); border-radius: 28px; padding:32px; width:380px; text-align: center; }
.pin-dots { display:flex; justify-content:center; gap:14px; margin:24px 0; }
.pin-dot { width:16px; height:16px; border-radius:99px; background:var(--border); }
.pin-dot.filled { background:var(--blue); box-shadow: 0 0 10px var(--blue); }
.pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:240px; margin:0 auto; }
.pin-key { border:1px solid var(--border); background:var(--card-soft); color:var(--text-strong); border-radius:16px; padding:16px; font-size:22px; font-weight:700; }
.pin-error { color: var(--red); font-size: 14px; margin-top: 12px; min-height: 20px; font-weight: 600; }

.toast { display:none; position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%); z-index: 250; background: var(--text-strong); color: var(--app); border-radius: 99px; padding: 16px 32px; box-shadow: var(--shadow); font-weight: 700; font-size: 14px; }
.toast.show { display:block; animation: toastIn 0.2s ease; }
.badge { min-width: 18px; height: 18px; border-radius: 99px; background: var(--red); color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
.pill-btn { border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 12px; padding: 10px 18px; font-size: 13px; font-weight: 700; }
.pill-btn.primary { background: var(--blue); color: white; border-color: var(--blue); }
.pill-btn.danger { background: var(--red-soft); color: var(--red); border-color: var(--red); }
.footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; flex-shrink: 0; }
.job-amt { color: var(--green); background: var(--green-soft); border-radius: 999px; padding: 4px 10px; font-size: 13px; font-weight: 700; }
.job-amt.pending-pay { color: var(--blue); background: var(--blue-soft); }
.job-amt.paid-out { color: var(--text); background: var(--card-soft); text-decoration: line-through; }
</style>
</head>

  { id:'henry', name:'Henry', emoji:'🚀', cls:'card-henry', age:'Age 11', weeklyAllowance:7.00, streak:5, chores:[
    { id:'h1', name:'Make bed', type:'weekly' },
    { id:'h2', name:'Empty dishwasher', type:'weekly' },
    { id:'h3', name:'Vacuum living room', type:'weekly' },
    { id:'h4', name:'Take out recycling', type:'weekly' },
    { id:'h5', name:'Homework done', type:'weekly' },
  ]},
];

function getWeekKey() { const d = new Date(), j1 = new Date(d.getFullYear(),0,1); return `w${d.getFullYear()}_${Math.ceil(((d-j1)/86400000+j1.getDay()+1)/7)}`; }
function deepCopy(v) { return JSON.parse(JSON.stringify(v)); }
function freshState() { return { people: deepCopy(DEFAULT_PEOPLE), checked:{}, approved:{}, pending:[], logs:[], globalTodos:[], weekKey:getWeekKey(), dinnerEnabled: false, dinnerMenu: '' }; }

function normalizeState(input) {
  const base = freshState(); const s = (input && typeof input === 'object') ? input : {};
  return {
    people: Array.isArray(s.people) && s.people.length ? s.people : base.people,
    checked: s.checked && typeof s.checked === 'object' && !Array.isArray(s.checked) ? s.checked : {},
    approved: s.approved && typeof s.approved === 'object' && !Array.isArray(s.approved) ? s.approved : {},
    pending: Array.isArray(s.pending) ? s.pending : [],
    logs: Array.isArray(s.logs) ? s.logs : [],
    globalTodos: Array.isArray(s.globalTodos) ? s.globalTodos : [],
    weekKey: typeof s.weekKey === 'string' ? s.weekKey : getWeekKey(),
    dinnerEnabled: typeof s.dinnerEnabled === 'boolean' ? s.dinnerEnabled : base.dinnerEnabled,
    dinnerMenu: typeof s.dinnerMenu === 'string' ? s.dinnerMenu : base.dinnerMenu
  };
}

function loadState() {
  try { const r = localStorage.getItem('fb_v11'); if (r) return normalizeState(JSON.parse(r)); } catch {}
  return freshState();
}
function saveState() {
  state = normalizeState(state); try { localStorage.setItem('fb_v11', JSON.stringify(state)); } catch {}
  applySyncStatus(firebaseOnline ? 'saving' : 'local');
  if (stateRef && !isLoadingFromCloud) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      stateRef.set(state).then(() => applySyncStatus('synced')).catch(() => applySyncStatus('local'));
    }, 120);
  }
}
let state = loadState(); state = normalizeState(state);

// ══════════════════════════════════════════════
// ALERTS BANNER PROCESSING
// ══════════════════════════════════════════════
function processSystemBanners() {
  const banner = document.getElementById('system-announcement-banner'); if(!banner) return;
  const now = new Date(), hrs = now.getHours(), mins = now.getMinutes();
  
  if ((hrs === 19 && mins >= 35) || (hrs === 20 && mins <= 5)) {
    let delta = 80 - mins; if(hrs===20) delta = 5 - mins;
    banner.className = "smart-banner alert-active";
    banner.innerHTML = `🎬 <b>ALERT:</b> Family Movie Time begins in ${delta > 0 ? delta : 0} minutes! Clear your items.`;
  } else if (state.dinnerEnabled && state.dinnerMenu) {
    banner.className = "smart-banner"; banner.innerHTML = `🍽️ <b>Tonight's Dinner:</b> ${state.dinnerMenu}`;
  } else {
    banner.className = "smart-banner"; banner.innerHTML = `✨ <b>Deutmeyer Command Core</b> · Welcome home.`;
  }
}
setInterval(processSystemBanners, 15000);

function uid() { return Math.random().toString(36).substr(2,9); }
function isChecked(pid,cid) { return (state.checked[pid] || []).includes(cid); }
function isApproved(pid) { return state.approved[pid]?.allowance === true; }
function isJobApproved(pid,cid) { return state.approved[pid]?.jobs?.[cid] === true; }
function personProgress(p) { const total = p.chores.length; const done = p.chores.filter(c => isChecked(p.id, c.id)).length; return { total, done, pct: total ? Math.round(done / total * 100) : 0 }; }
function pendingCount() { return state.pending.length; }
function applySyncStatus(mode) {
  const dot = document.getElementById('cloud-dot'), label = document.getElementById('sync-label'); if(!dot || !label) return;
  dot.className = 'status-dot' + (mode !== 'synced' && mode !== 'saving' ? ' offline' : '');
  label.textContent = mode === 'synced' ? 'System Live' : mode === 'saving' ? 'Syncing...' : 'Local File Mesh';
}
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2800); }
function pushLogTrail(msg) { const now = new Date(); state.logs.unshift({ id: uid(), time: now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), msg }); if(state.logs.length > 40) state.logs.pop(); }
function allWeeklyDone(pid) { const p = state.people.find(x => x.id === pid); const weekly = p ? p.chores.filter(c => c.type === 'weekly') : []; return weekly.length > 0 && weekly.every(c => isChecked(pid, c.id)); }
function earnedTotal(pid) { const p = state.people.find(x => x.id === pid); if (!p) return 0; let total = isApproved(pid) ? p.weeklyAllowance : 0; p.chores.filter(c => c.type === 'job').forEach(c => { if (isJobApproved(pid,c.id)) total += Number(c.amt) || 0; }); return total; }

// ══════════════════════════════════════════════
// ENGINE MUTATION PIPELINES
// ══════════════════════════════════════════════
function toggleChore(pid,cid) {
  if (isApproved(pid)) { const p = state.people.find(x => x.id === pid); if (p?.chores.find(c => c.id === cid)?.type === 'weekly') return; }
  if (!state.checked[pid]) state.checked[pid] = []; const idx = state.checked[pid].indexOf(cid);
  const p = state.people.find(x => x.id === pid); const c = p?.chores.find(x => x.id === cid);
  
  if (idx === -1) {
    state.checked[pid].push(cid); chimeCheck(); confetti({ particleCount: 35, spread: 45, origin: { y: 0.85 } });
    pushLogTrail(`${p.name} completed: ${c.name}`);
  } else {
    state.checked[pid].splice(idx,1); pushLogTrail(`${p.name} uncompleted: ${c.name}`);
  }

  if (allWeeklyDone(pid) && p.weeklyAllowance > 0 && !isApproved(pid)) {
    if (!state.pending.some(x => x.type === 'allowance' && x.personId === pid)) {
      state.pending.push({ id: uid(), type: 'allowance', personId: pid, amt: p.weeklyAllowance });
      showToast(`${p.name} finished core goals! 🎉`); confetti({ particleCount: 150, spread: 80, origin: { y: 0.5 } });
    }
  }
  saveState(); renderAll();
}

function openFastTaskOverlay() { document.getElementById('fast-task-overlay').classList.add('open'); document.getElementById('front-task-input').focus(); }
function closeFastTaskOverlay(e) { if(e.target.id === 'fast-task-overlay') e.target.classList.remove('open'); }

function injectTaskOnTheFly() {
  const input = document.getElementById('front-task-input'), targetSel = document.getElementById('front-assignee-select');
  const value = input.value.trim(); if(!value) return; const target = targetSel.value;
  if(target === 'global_todo') {
    state.globalTodos.push({ id: uid(), name: value, done: false }); pushLogTrail(`Shared Family Task added: ${value}`);
  } else {
    const p = state.people.find(x => x.id === target);
    if(p) { p.chores.push({ id: uid(), name: value, type: 'weekly', amt: 0 }); pushLogTrail(`Fast Task assigned to ${p.name}: ${value}`); }
  }
  input.value = ''; document.getElementById('fast-task-overlay').classList.remove('open'); saveState(); renderAll();
}

function toggleGlobalTodo(id) {
  const todo = state.globalTodos.find(x => x.id === id);
  if(todo) {
    todo.done = !todo.done; if(todo.done) { chimeCheck(); confetti({ particleCount: 30, spread: 40, origin: { y: 0.85 } }); }
    pushLogTrail(`Shared Family Task status flipped: ${todo.name}`); saveState(); renderAll();
  }
}
function clearFinishedTodos() { state.globalTodos = state.globalTodos.filter(x => !x.done); saveState(); renderAll(); }
function toggleDinnerMenu(on) { state.dinnerEnabled = on; saveState(); renderAll(); }
function saveDinnerMenu() { state.dinnerMenu = document.getElementById('dinner-input').value.trim(); saveState(); renderAll(); showToast('Menu Broadcast Dispatched!'); }
function clearHistoryLogs() { state.logs = []; saveState(); renderAll(); }

function approveItem(itemId) {
  const item = state.pending.find(x => x.id === itemId); if (!item) return;
  if (!state.approved[item.personId]) state.approved[item.personId] = { jobs:{} };
  const p = state.people.find(x => x.id === item.personId);
  if (item.type === 'allowance') { state.approved[item.personId].allowance = true; if(p) p.streak++; pushLogTrail(`Parent signed allowance loop for ${p.name}`); }
  else { state.approved[item.personId].jobs[item.choreId] = true; pushLogTrail(`Parent checked off premium venture item for ${p.name}`); }
  chimeCascade(); state.pending = state.pending.filter(x => x.id !== itemId); saveState(); renderAll();
}
function denyItem(itemId) {
  const item = state.pending.find(x => x.id === itemId); if (!item) return;
  if (item.type === 'allowance') state.checked[item.personId] = [];
  else if (item.choreId && state.checked[item.personId]) state.checked[item.personId] = state.checked[item.personId].filter(x => x !== item.choreId);
  state.pending = state.pending.filter(x => x.id !== itemId); saveState(); renderAll();
}

function updateAllowance(pid,val) { const p = state.people.find(x => x.id === pid); if(p) p.weeklyAllowance = parseFloat(val) || 0; saveState(); renderAll(); }
function selectType(pid,type) { document.getElementById(`btn-weekly-${pid}`)?.classList.toggle('selected', type === 'weekly'); document.getElementById(`btn-job-${pid}`)?.classList.toggle('selected', type === 'job'); }
function getSelectedType(pid) { return document.getElementById(`btn-job-${pid}`)?.classList.contains('selected') ? 'job' : 'weekly'; }
function addChore(pid) {
  const nameEl = document.getElementById(`inp-name-${pid}`), amtEl = document.getElementById(`inp-amt-${pid}`); const name = nameEl.value.trim(); if (!name) return;
  const type = getSelectedType(pid), amt = type === 'job' ? (parseFloat(amtEl.value) || 0) : 0;
  state.people.find(x => x.id === pid).chores.push({ id: uid(), name, amt, type }); saveState(); renderAll();
}
function deleteChore(pid,cid) {
  const p = state.people.find(x => x.id === pid); p.chores = p.chores.filter(c => c.id !== cid);
  if (state.checked[pid]) state.checked[pid] = state.checked[pid].filter(x => x !== cid);
  state.pending = state.pending.filter(x => !(x.personId === pid && x.choreId === cid)); saveState(); renderAll();
}
function undoApproval(pid) { if (state.approved[pid]) { state.approved[pid].allowance = false; const p = state.people.find(x => x.id === pid); if(p && p.streak > 0) p.streak--; } saveState(); renderAll(); }
function doReset() {
  const kept = state.people.map(p => ({...p, chores:p.chores.filter(c => c.type === 'weekly')}));
  state = {...freshState(), people: kept, logs: state.logs, dinnerEnabled: state.dinnerEnabled, dinnerMenu: state.dinnerMenu};
  pushLogTrail(`Universal system loop reset executed.`); saveState(); closeModal('reset-modal'); renderAll();
}

// ══════════════════════════════════════════════
// THE WALK-BY VIEW MASTER UNIFIED BUILDER
// ══════════════════════════════════════════════
function renderUnifiedFrontMatrix() {
  let html = '';
  
  // 1. Render Shared Family Tasks
  if(state.globalTodos && state.globalTodos.length > 0) {
    html += `<div class="list-label" style="color:var(--purple);"><span>📌 Shared Family Tasks</span><button class="pill-btn ghost" onclick="clearFinishedTodos()" style="font-size:10px; padding:2px 6px;">Clear Checked</button></div>`;
    state.globalTodos.forEach(todo => {
      html += `<div class="chore-row ${todo.done ? 'done':''}" onclick="toggleGlobalTodo('${todo.id}')"><div class="chk" style="--person:var(--purple);">${todo.done ? '✓':''}</div><div class="chore-name">${todo.name}</div><div></div></div>`;
    });
  }

  // 2. Loop Individual Profiles (Priority Children -> Sub Adults Grid Mapping)
  state.people.forEach(p => {
    const active = p.chores.filter(c => !isChecked(p.id, c.id));
    const completed = p.chores.filter(c => isChecked(p.id, c.id));
    const prog = personProgress(p);
    const approved = isApproved(p.id);
    const streakText = p.streak > 0 ? `<span class="p-widget-streak">🔥 ${p.streak} Wk Streak</span>` : '';

    html += `<div class="list-label" style="margin-top:14px; border-bottom: 1px solid var(--border-soft); padding-bottom:4px;">
      <span style="color:var(--text-strong); font-size:16px; font-weight:800;">${p.emoji} ${p.name}'s Manifest (${prog.done}/${p.chores.length})</span>
      ${streakText}
    </div>`;

    if(p.chores.length === 0) {
      html += `<div style="font-size:13px; color:var(--text); padding:8px 14px;">No operational assignments active.</div>`;
      return;
    }

    // List remaining obligations first
    active.forEach(c => {
      const isJob = c.type === 'job';
      const actionFn = isJob ? `requestJobApproval('${p.id}','${c.id}')` : `toggleChore('${p.id}','${c.id}')`;
      html += `<div class="chore-row" onclick="${actionFn}"><div class="chk" style="--person:var(--${p.id})"></div><div class="chore-name">${c.name}</div><div style="font-size:12px; font-weight:700; color:var(--text)">${isJob ? '$'+c.amt.toFixed(2):'Core'}</div></div>`;
    });

    // List cleared operations second
    completed.forEach(c => {
      const isJob = c.type === 'job';
      const jpending = state.pending.some(x => x.type === 'job' && x.personId === p.id && x.choreId === c.id);
      const japproved = isJobApproved(p.id, c.id);
      let statusLabel = isJob ? (japproved ? 'Paid' : (jpending ? 'Pending' : 'Done')) : 'Done';
      html += `<div class="chore-row done" onclick="toggleChore('${p.id}','${c.id}')"><div class="chk" style="background:var(--${p.id}); border-color:var(--${p.id})">✓</div><div class="chore-name">${c.name}</div><div style="font-size:12px; color:var(--text)">${statusLabel}</div></div>`;
    });
  });

  document.getElementById('unified-master-tracks').innerHTML = html;
}

function renderDetailedChoreManifestPage() {
  document.getElementById('chores-people-container').innerHTML = state.people.map(p => {
    const earned = earnedTotal(p.id);
    return `<div class="card pad" style="border-top:4px solid var(--${p.id})">
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <span style="font-size:24px">${p.emoji}</span><span style="font-size:18px; font-weight:800; color:var(--text-strong)">${p.name}</span>
        <span style="margin-left:auto; font-size:16px; font-weight:800; color:var(--text-strong)">$${earned.toFixed(2)}</span>
      </div>
      ${p.chores.map(c => {
        const done = isChecked(p.id, c.id); return `<div class="chore-row ${done?'done':''}" onclick="toggleChore('${p.id}','${c.id}')"><div class="chk" style="${done?'background:var(--'+p.id+'); border-color:var(--'+p.id+')':''}">${done?'✓':''}</div><div class="chore-name">${c.name}</div><div style="font-size:11px; color:var(--text)">${c.type==='job'?'Premium':'Core'}</div></div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function renderHistoryLogsView() {
  const container = document.getElementById('history-logs-container'); if(!container) return;
  if(state.logs.length === 0) { container.innerHTML = `<div class="empty-state">No execution trails stored in buffer.</div>`; return; }
  container.innerHTML = state.logs.map(l => `<div class="history-manifest-card"><span style="font-size:14px; color:var(--text-strong); font-weight:600;">${l.msg}</span><span style="font-size:12px; color:var(--text); font-weight:600;">${l.time}</span></div>`).join('');
}

function renderApprovalsView() {
  const container = document.getElementById('approvals-container'); if (state.pending.length === 0) { container.innerHTML = `<div class="empty-state">Matrix Clear. No logs pending verification.</div>`; return; }
  container.innerHTML = `<div class="approval-list">${state.pending.map(item => {
    const p = state.people.find(x => x.id === item.personId) || {emoji:'•', name:'User'};
    return `<div class="approval-item"><span style="font-size:22px">${p.emoji}</span><div><div style="font-weight:800; color:var(--text-strong)">${p.name}</div><div style="font-size:12px">${item.type==='allowance'?'Core allowance disbursal checkout':'Premium task completion sign-off'}</div></div><div style="margin-left:auto; display:flex; gap:8px;"><button class="pill-btn danger" onclick="denyItem('${item.id}')">Deny</button><button class="pill-btn primary" onclick="approveItem('${item.id}')">Approve</button></div></div>`;
  }).join('')}</div>`;
}

function renderManageView() {
  document.getElementById('manage-grid').innerHTML = state.people.map(person => {
    return `<div class="card pad">
      <div style="font-weight:800; font-size:15px; color:var(--text-strong); margin-bottom:10px;">Adjust Manifest: ${person.name}</div>
      <div class="field-row"><label>Base Value ($)</label><input class="inp" type="number" min="0" step="0.5" value="${person.weeklyAllowance.toFixed(2)}" onchange="updateAllowance('${person.id}',this.value)" /></div>
      ${person.chores.map(c => `<div class="manage-chore-row"><span style="font-size:13px">${c.name}</span><button class="del-btn" onclick="deleteChore('${person.id}','${c.id}')">×</button></div>`).join('')}
      <div class="add-form"><input class="inp" id="inp-name-${person.id}" placeholder="Objective Title Text..." /><div style="display:flex; gap:6px;"><input class="inp" id="inp-amt-${person.id}" type="number" placeholder="$" style="width:70px;" /><div class="type-row" style="flex:1;"><button class="type-btn selected" id="btn-weekly-${person.id}" onclick="selectType('${person.id}','weekly')">Core</button><button class="type-btn" id="btn-job-${person.id}" onclick="selectType('${person.id}','job')">Premium</button></div></div><button class="add-btn" onclick="addChore('${person.id}')">Inject Operational Node</button></div>
    </div>`;
  }).join('');
  document.getElementById('toggle-dinner-feature').checked = state.dinnerEnabled; document.getElementById('manage-dinner-box').style.display = state.dinnerEnabled ? 'block' : 'none'; document.getElementById('dinner-input').value = state.dinnerMenu;
}

function updateSystemCounters() {
  const total = state.people.reduce((sum,p) => sum + p.chores.length, 0), done = state.people.reduce((sum,p) => sum + p.chores.filter(c => isChecked(p.id,c.id)).length, 0);
  const apprBadge = document.getElementById('appr-badge'); if(apprBadge) { apprBadge.style.display = pendingCount() > 0 ? 'inline-flex' : 'none'; apprBadge.textContent = pendingCount(); }
  document.getElementById('stats-total-value').textContent = `${done}/${total}`; document.getElementById('stats-pending-value').textContent = pendingCount();
  
  const dinnerBanner = document.getElementById('home-dinner-card');
  if(state.dinnerEnabled && state.dinnerMenu) { dinnerBanner.style.display = 'block'; document.getElementById('home-dinner-text').textContent = state.dinnerMenu; } else { dinnerCard.style.display = 'none'; }
}

function renderAll() {
  state = normalizeState(state); renderUnifiedFrontMatrix(); renderDetailedChoreManifestPage(); renderHistoryLogsView(); renderApprovalsView(); renderManageView(); updateSystemCounters(); processSystemBanners();
}

// ══════════════════════════════════════════════
// SWITCH INTERFACES & PLATFORM ROUTERS
// ══════════════════════════════════════════════
let manageUnlocked = false;
function switchTab(name) {
  if (name === 'manage' && !manageUnlocked) { requirePin('manage'); return; }
  document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', ['home','chores','approvals','history','manage'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
  if (name === 'home') renderUnifiedFrontMatrix(); if (name === 'chores') renderDetailedChoreManifestPage(); if (name === 'history') renderHistoryLogsView(); if (name === 'approvals') renderApprovalsView(); if (name === 'manage') renderManageView();
}
function setupCalendar() { document.getElementById('cal-agenda').src = GOOGLE_CAL_URL + '&mode=AGENDA&showTitle=0&showPrint=0&showCalendars=0&showTabs=0&showTz=0&wkst=1&bgcolor=%230b0f19'; }
function updateClock() {
  const now = new Date(), h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0'); document.getElementById('clock').textContent = `${h%12||12}:${m}`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'], months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date').textContent = `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}`;
}

let pinBuffer = '', pinAction = null;
function requirePin(action) { pinAction = action; pinBuffer = ''; updatePinDots(); document.getElementById('pin-error').textContent = ''; document.getElementById('pin-modal').classList.add('open'); }
function pinKey(k) { if (k === 'cancel') { closeModal('pin-modal'); return; } if (k === 'back') { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); return; } if (pinBuffer.length >= 4) return; pinBuffer += k; updatePinDots(); if (pinBuffer.length === 4) setTimeout(checkPin, 120); }
function updatePinDots() { for (let i=0;i<4;i++) document.getElementById(`pd${i}`).classList.toggle('filled', i < pinBuffer.length); }
function checkPin() { if (pinBuffer === PARENT_PIN) { closeModal('pin-modal'); if (pinAction === 'reset') document.getElementById('reset-modal').classList.add('open'); if (pinAction === 'manage') { manageUnlocked = true; switchTab('manage'); } } else { document.getElementById('pin-error').textContent = 'Clearance failure.'; pinBuffer = ''; updatePinDots(); } }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function startCloudSync() {
  if (!stateRef) { applySyncStatus('local'); return; }
  stateRef.on('value', snapshot => {
    const cloudState = snapshot.val(); if (!cloudState && !hasLoadedCloudOnce) { hasLoadedCloudOnce = true; saveState(); return; }
    if (cloudState) { hasLoadedCloudOnce = true; isLoadingFromCloud = true; state = normalizeState(cloudState); renderAll(); isLoadingFromCloud = false; applySyncStatus('synced'); }
  }, () => applySyncStatus('local'));
}

setupCalendar(); updateClock(); setInterval(updateClock, 15000); renderAll(); startCloudSync(); resetAmbientTimer(); setTimeout(processSystemBanners, 1000);
