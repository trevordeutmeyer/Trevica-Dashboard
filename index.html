<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Deutmeyer Family Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<!-- Canvas Confetti Library for Celebrations -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --bg: #030712;
  --app: #0b0f19;
  --card: rgba(22, 30, 49, 0.85);
  --card-soft: rgba(30, 41, 59, 0.5);
  --text: #94a3b8;
  --text-strong: #f8fafc;
  --muted: #475569;
  --border: rgba(255, 255, 255, 0.08);
  --border-soft: rgba(255, 255, 255, 0.03);
  --blue: #38bdf8;
  --blue-soft: rgba(56, 189, 248, 0.15);
  --green: #4ade80;
  --green-soft: rgba(74, 222, 128, 0.15);
  --amber: #fbbf24;
  --amber-soft: rgba(251, 191, 36, 0.15);
  --red: #f87171;
  --red-soft: rgba(248, 113, 113, 0.15);
  --purple: #c084fc;
  --purple-soft: rgba(192, 132, 252, 0.18);
  --shadow: 0 20px 40px rgba(0,0,0,0.5);
  --radius: 24px;
  --radius-sm: 16px;
  --dad: #4ade80;
  --mom: #f87171;
  --jules: #38bdf8;
  --henry: #f97316;
  --cal-filter: invert(0.92) hue-rotate(180deg) contrast(1.25);
}

* { box-sizing: border-box; touch-action: manipulation; user-select: none; }
html, body { height: 100vh; overflow: hidden; margin: 0; background: var(--bg); }
body { font-family: 'Plus Jakarta Sans', Arial, sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }

/* Main Full-Screen Layout Wrapper (Eliminates Scrollbars) */
.app-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 1600px;
  margin: 0 auto;
  background: var(--app);
  padding: 0 16px;
}

/* Header Area */
.topbar {
  padding: 16px 12px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
.main-title-headline { margin: 0; color: var(--text-strong); font-size: 26px; font-weight: 800; letter-spacing: -0.04em; }

.dock-container { display: inline-flex; background: var(--card-soft); border: 1px solid var(--border); padding: 4px; border-radius: 16px; }
.nav-tab {
  appearance: none; border: none; background: transparent; color: var(--text); border-radius: 12px;
  padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s ease;
}
.nav-tab.active { background: var(--app); color: var(--blue); box-shadow: var(--shadow); }

.time-block { text-align: right; }
#clock { color: var(--text-strong); font-size: 28px; font-weight: 800; line-height: 1; }
#date { color: var(--text); font-size: 12px; font-weight: 600; margin-top: 2px; }

/* Dynamic Announcement Bar */
.smart-banner {
  flex-shrink: 0;
  margin: 12px 12px 0;
  padding: 14px 20px;
  border-radius: var(--radius-sm);
  background: var(--card-soft);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  color: var(--text-strong);
}
.smart-banner.alert-active {
  background: linear-gradient(90deg, var(--purple-soft), rgba(124, 58, 237, 0.4));
  border-color: var(--purple);
  box-shadow: 0 0 20px rgba(192, 132, 252, 0.2);
}

.content { flex: 1; min-height: 0; padding: 16px 12px 24px; position: relative; }
.panel { display: none; height: 100%; }
.panel.active { display: flex; flex-direction: column; }

/* Split Screen Content Matrix */
.today-master-layout {
  display: grid;
  grid-template-columns: 1fr;
  height: 100%;
  gap: 16px;
}
@media (min-width: 1024px) {
  .today-master-layout { grid-template-columns: 0.85fr 1.15fr; }
}

/* Left Column: Calendar Box */
.calendar-card-box { display: flex; flex-direction: column; height: 100%; }
.calendar-frame-wrap { flex: 1; min-height: 0; background: var(--app); position: relative; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.calendar-frame-wrap iframe { width: 100%; height: 100%; border: 0; filter: var(--cal-filter); }

/* Right Column: Interactive Core Feed */
.main-tracking-core { display: flex; flex-direction: column; height: 100%; min-height: 0; }
.scroll-payload-box { flex: 1; min-height: 0; overflow-y: auto; padding-right: 6px; }

/* Large High-Contrast Row Elements */
.chore-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 16px;
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  min-height: 60px;
  background: var(--card-soft);
  margin-bottom: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.chore-row:hover { border-color: var(--border); transform: translateY(-2px); background: var(--card); }
.chore-row:active { transform: scale(0.98); }
.chore-row.done { opacity: 0.35; }
.chore-row.done .chore-name { text-decoration: line-through; }

.chk {
  width: 28px;
  height: 28px;
  border-radius: 9px;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: white;
  background: rgba(0,0,0,0.02);
}
.chore-row.done .chk { background: var(--person, var(--blue)); border-color: var(--person, var(--blue)); }
.chore-name { font-size: 16px; font-weight: 700; color: var(--text-strong); }

.list-label { font-size: 12px; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: 0.08em; padding: 12px 4px 6px; display: flex; align-items: center; justify-content: space-between; }
.p-widget-streak { font-size: 11px; background: linear-gradient(135deg, #ff9800, #ff5722); color: #ffffff; padding: 3px 10px; border-radius: 8px; font-weight: 800; box-shadow: 0 4px 10px rgba(255, 87, 34, 0.2); }

/* Quick Summary Statistics Header Strip */
.quick-stats-stack { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; flex-shrink: 0; }
.stat-mini { background: var(--card-soft); padding: 12px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border-soft); text-align: center; }
.stat-m-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; }
.stat-m-val { font-size: 22px; font-weight: 800; color: var(--text-strong); margin-top: 2px; }
.card { background: var(--card-soft); border: 1px solid var(--border); border-radius: var(--radius-sm); }
.card.pad { padding: 18px; }
.eyebrow { display: flex; align-items: center; gap: 8px; color: var(--text); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.status-dot { width: 9px; height: 9px; border-radius: 999px; background: var(--green); box-shadow: 0 0 12px var(--green); display: inline-block; }
.status-dot.offline { background: var(--amber); box-shadow: 0 0 12px var(--amber); }
.dinner-title { color: var(--purple); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.empty-state { color: var(--text); background: var(--card-soft); border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 22px; text-align: center; font-weight: 700; }
.pill-btn.ghost { background: transparent; }

/* Floating Plus Pop-up Setup */
.floating-action-node {
  position: absolute; right: 20px; bottom: 20px; width: 56px; height: 56px; border-radius: 99px;
  background: var(--blue); color: white; border: none; font-size: 26px; font-weight: 700;
  box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3); z-index: 100;
}
.overlay-glass-container {
  display: none; position: fixed; inset: 0; background: rgba(2, 4, 8, 0.65);
  backdrop-filter: blur(20px); z-index: 999; align-items: center; justify-content: center; padding: 20px;
}
.overlay-glass-container.open { display: flex; }
.overlay-card { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: var(--radius); width: 100%; max-width: 420px; box-shadow: var(--shadow); }

/* Panel Scroll Containers */
.panel-scroll-frame { flex: 1; min-height: 0; overflow-y: auto; padding-right: 4px; }
.chores-layout-box { display: grid; grid-template-columns: 1fr; gap: 16px; }
@media(min-width: 768px) { .chores-layout-box { grid-template-columns: repeat(2, 1fr); } }

.approval-list { display: grid; gap: 12px; }
.approval-item { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center; }
.history-manifest-card { background: var(--card-soft); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 18px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.manage-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
@media(min-width: 768px) { .manage-grid { grid-template-columns: repeat(2, 1fr); } }

.field-row { display: grid; grid-template-columns: 1fr 110px; gap: 12px; align-items: center; padding-bottom: 12px; border-bottom: 1px solid var(--border-soft); margin-bottom: 12px; }
.inp { border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 12px; padding: 12px; font-size: 15px; outline: none; width: 100%; }
.add-form { margin-top: 14px; background: var(--card-soft); padding: 12px; border-radius: var(--radius-sm); display: grid; gap: 10px; }
.type-row { display: flex; gap: 10px; }
.type-btn { flex: 1; border: 1px solid var(--border); background: var(--card); color: var(--muted); padding: 10px; border-radius: 10px; font-weight: 700; font-size: 13px; }
.type-btn.selected { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
.add-btn { border: none; background: var(--text-strong); color: var(--app); border-radius: 10px; padding: 12px; font-weight: 700; }
.del-btn { border: none; background: var(--red-soft); color: var(--red); width: 32px; height: 32px; border-radius: 8px; font-weight: 700; }
.manage-chore-row { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-soft); }

.modal-bg { display:none; position:fixed; inset:0; background:rgba(15,23,42,.7); backdrop-filter: blur(16px); z-index:200; align-items:center; justify-content:center; padding: 20px; }
.modal-bg.open { display:flex; }
.modal { background:var(--card); border:1px solid var(--border); border-radius: 28px; padding:32px; width:380px; text-align: center; }
.pin-dots { display:flex; justify-content:center; gap:14px; margin:24px 0; }
.pin-dot { width:16px; height:16px; border-radius:99px; background:var(--border); }
.pin-dot.filled { background:var(--blue); box-shadow: 0 0 10px var(--blue); }
.pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:240px; margin:0 auto; }
.pin-key { border:1px solid var(--border); background:var(--card-soft); color:var(--text-strong); border-radius:16px; padding:16px; font-size:22px; font-weight:700; }
.pin-error { color: var(--red); font-size: 14px; margin-top: 12px; min-height: 20px; font-weight: 600; }

.toast { display:none; position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%); z-index: 250; background: var(--text-strong); color: var(--app); border-radius: 99px; padding: 16px 32px; box-shadow: var(--shadow); font-weight: 700; font-size: 14px; }
.toast.show { display:block; animation: toastIn 0.2s ease; }
.badge { min-width: 18px; height: 18px; border-radius: 99px; background: var(--red); color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
.pill-btn { border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 12px; padding: 10px 18px; font-size: 13px; font-weight: 700; }
.pill-btn.primary { background: var(--blue); color: white; border-color: var(--blue); }
.pill-btn.danger { background: var(--red-soft); color: var(--red); border-color: var(--red); }
.footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; flex-shrink: 0; }
.job-amt { color: var(--green); background: var(--green-soft); border-radius: 999px; padding: 4px 10px; font-size: 13px; font-weight: 700; }
.job-amt.pending-pay { color: var(--blue); background: var(--blue-soft); }
.job-amt.paid-out { color: var(--text); background: var(--card-soft); text-decoration: line-through; }
</style>
</head>
<body>

<div class="app-shell">
  <header class="topbar">
    <div class="topbar-row">
      <div class="brand-block">
        <div class="eyebrow"><span class="status-dot" id="cloud-dot"></span><span id="sync-label">Loading</span></div>
        <h1 class="main-title-headline">Deutmeyer Family Dashboard</h1>
      </div>
      
      <div class="dock-container" aria-label="Dashboard navigation">
        <button class="nav-tab active" onclick="switchTab('home')">Today</button>
        <button class="nav-tab" onclick="switchTab('chores')">All Chores</button>
        <button class="nav-tab" onclick="switchTab('approvals')">Approvals <span class="badge" id="appr-badge" style="display:none">0</span></button>
        <button class="nav-tab" onclick="switchTab('history')">History Log</button>
        <button class="nav-tab" onclick="switchTab('manage')">Manage</button>
      </div>

      <div class="time-block">
        <div id="clock">--:--</div>
        <div id="date">--</div>
      </div>
    </div>
  </header>

  <!-- Announcement Strip Layer -->
  <div class="smart-banner" id="system-announcement-banner">
    Deutmeyer Household Hub Loading...
  </div>

  <main class="content">
    
    <!-- MASTER HUB TODAY PANEL VIEW -->
    <section class="panel active" id="panel-home">
      <div class="today-master-layout">
        
        <!-- Left: Optimized Calendar Frame -->
        <div class="calendar-card-box">
          <div class="calendar-frame-wrap">
            <iframe id="cal-agenda" src="" loading="lazy"></iframe>
          </div>
        </div>

        <!-- Right: Combined Action Streams Box -->
        <div class="main-tracking-core">
          
          <div style="display:flex; gap:12px; align-items:center; flex-shrink:0;">
            <div class="quick-stats-stack" id="quick-stats" style="flex:1.2; margin-bottom:0;">
              <div class="stat-mini">
                <div class="stat-m-label">Done</div>
                <div class="stat-m-val" id="stats-total-value">0/0</div>
              </div>
              <div class="stat-mini">
                <div class="stat-m-label">Pending</div>
                <div class="stat-m-val" id="stats-pending-value">0</div>
              </div>
              <div class="stat-mini">
                <div class="stat-m-label">Week</div>
                <div class="stat-m-val" id="stats-week-value">--</div>
              </div>
            </div>
            <div class="card" id="home-dinner-card" style="display:none; flex:0.8; padding:10px 14px; background:linear-gradient(135deg, var(--purple-soft), transparent); border-color:var(--purple);">
              <div class="dinner-title">🍽️ Tonight's Dinner Plan</div>
              <div id="home-dinner-text" style="font-size:14px; font-weight:700; color:var(--text-strong)"></div>
            </div>
          </div>

          <!-- Master Unified Multi-Feed Sheet List -->
          <div class="scroll-payload-box" id="unified-master-tracks"></div>
          
        </div>
      </div>

      <!-- Quick Task On-The-Fly Trigger Button -->
      <button class="floating-action-node" onclick="openFastTaskOverlay()">+</button>
    </section>

    <!-- EXPANDED DETAILED ALL CHORES VIEW -->
    <section class="panel" id="panel-chores">
      <div class="panel-scroll-frame">
        <div class="chores-layout-box" id="chores-people-container"></div>
      </div>
    </section>

    <!-- PARENT PENDING REVIEW BOARD -->
    <section class="panel" id="panel-approvals">
      <div class="panel-scroll-frame" id="approvals-container"></div>
    </section>

    <!-- LIVE HISTORY RUNTIME ACTION LOG DISPLAY -->
    <section class="panel" id="panel-history">
      <div class="panel-scroll-frame">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
          <div style="font-size:16px; font-weight:800; color:var(--text-strong)">Recent Activity</div>
          <button class="pill-btn danger" onclick="clearHistoryLogs()">Clear History</button>
        </div>
        <div id="history-logs-container"></div>
      </div>
    </section>

    <!-- SYSTEM OVERRIDES MANAGEMENT LAYER -->
    <section class="panel" id="panel-manage">
      <div class="panel-scroll-frame">
        <div class="card pad" style="margin-bottom:16px;">
          <div class="card-main-title" style="margin-bottom:10px">Dashboard Settings</div>
          <label style="display:inline-flex; align-items:center; gap:10px; font-weight:700; cursor:pointer; font-size:14px; color:var(--text-strong)">
            <input type="checkbox" id="toggle-dinner-feature" onchange="toggleDinnerMenu(this.checked)" style="width:18px; height:18px;"> Show dinner plan
          </label>
          <div id="manage-dinner-box" style="margin-top:12px; display:none;">
            <input type="text" id="dinner-input" class="inp" placeholder="What is for dinner?" style="max-width:320px; display:inline-block; margin-right:10px;" />
            <button class="pill-btn primary" onclick="saveDinnerMenu()">Save Dinner</button>
          </div>
        </div>
        <div class="manage-grid" id="manage-grid"></div>
        <div style="margin-top:24px; text-align:right;"><button class="pill-btn danger" onclick="requirePin('reset')">Start New Week</button></div>
      </div>
    </section>

  </main>
</div>

<!-- Quick task modal -->
<div class="overlay-glass-container" id="fast-task-overlay" onclick="closeFastTaskOverlay(event)">
  <div class="overlay-card">
    <h3 style="margin:0 0 14px; font-size:18px; color:var(--text-strong)">Add a Quick Task</h3>
    <input type="text" id="front-task-input" class="inp" placeholder="Task name" style="margin-bottom:12px;" />
    <select id="front-assignee-select" class="inp" style="margin-bottom:16px; font-weight:700;">
      <option value="global_todo">📌 Shared Family List</option>
      <option value="jules">⭐ Jules</option>
      <option value="henry">🚀 Henry</option>
      <option value="dad">👨 Dad</option>
      <option value="mom">👩 Jessica</option>
    </select>
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button class="pill-btn" onclick="document.getElementById('fast-task-overlay').classList.remove('open')">Cancel</button>
      <button class="pill-btn primary" onclick="injectTaskOnTheFly()">Add Item</button>
    </div>
  </div>
</div>

<!-- Parent PIN modal -->
<div class="modal-bg" id="pin-modal">
  <div class="modal">
    <h3 style="margin:0 0 6px; color:var(--text-strong)">Parent Security Code</h3>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-pad">
      <div class="pin-key" onclick="pinKey('1')">1</div><div class="pin-key" onclick="pinKey('2')">2</div><div class="pin-key" onclick="pinKey('3')">3</div>
      <div class="pin-key" onclick="pinKey('4')">4</div><div class="pin-key" onclick="pinKey('5')">5</div><div class="pin-key" onclick="pinKey('6')">6</div>
      <div class="pin-key" onclick="pinKey('7')">7</div><div class="pin-key" onclick="pinKey('8')">8</div><div class="pin-key" onclick="pinKey('9')">9</div>
      <div class="pin-key" onclick="pinKey('cancel')" style="font-size:12px; color:var(--text)">Cancel</div><div class="pin-key" onclick="pinKey('0')">0</div><div class="pin-key" onclick="pinKey('back')">⌫</div>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<div class="modal-bg" id="reset-modal">
  <div class="modal">
    <h3 style="color:var(--text-strong)">Start a new week?</h3>
    <div class="modal-btns" style="display:flex; gap:10px; margin-top:14px;">
      <button class="pill-btn" onclick="closeModal('reset-modal')">Cancel</button>
      <button class="pill-btn danger" onclick="doReset()">Confirm Reset</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// Oscillator Audio Synthesizer Chip Controls (Tac Rewards)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(f, t, d, v) {
  try {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);

function cleanText(value, fallback = '') {

function safeKey(value, fallback) {

function normalizeChore(chore, fallbackId) {

function normalizePerson(person, index) {
  const source = person && typeof person === 'object' ? person : {};
  const fallback = DEFAULT_PEOPLE[index] || {};
  const id = safeKey(source.id || fallback.id, `person_${index + 1}`);
  const choresSource = Array.isArray(source.chores) ? source.chores : (Array.isArray(fallback.chores) ? fallback.chores : []);
  return {
    ...fallback,
    ...source,
    id,
    name: cleanText(source.name || fallback.name, 'Family member'),
    emoji: cleanText(source.emoji || fallback.emoji, '•'),
    cls: cleanText(source.cls || fallback.cls, `card-${id}`),
    role: cleanText(source.role || fallback.role, toMoney(source.weeklyAllowance ?? fallback.weeklyAllowance) > 0 ? 'child' : 'parent'),
    weeklyAllowance: toMoney(source.weeklyAllowance ?? fallback.weeklyAllowance),
    streak: Math.max(0, parseInt(source.streak ?? fallback.streak ?? 0, 10) || 0),
    chores: choresSource.map((c, choreIndex) => normalizeChore(c, `${id}_task_${choreIndex + 1}`))
  };
}

function normalizeChecked(checked) {
  const result = {};
  if (!checked || typeof checked !== 'object' || Array.isArray(checked)) return result;
  Object.entries(checked).forEach(([personId, choreIds]) => {
    if (!Array.isArray(choreIds)) return;
    result[safeKey(personId, 'person')] = choreIds.map((id, index) => safeKey(id, `task_${index + 1}`));
  });
  return result;
}

function normalizeApproved(approved) {
  const result = {};
  if (!approved || typeof approved !== 'object' || Array.isArray(approved)) return result;
  Object.entries(approved).forEach(([personId, record]) => {
    const source = record && typeof record === 'object' ? record : {};
    const jobs = source.jobs && typeof source.jobs === 'object' && !Array.isArray(source.jobs) ? source.jobs : {};
    result[safeKey(personId, 'person')] = {
      allowance: source.allowance === true,
      jobs: Object.entries(jobs).reduce((acc, [choreId, done]) => {
        acc[safeKey(choreId, 'task')] = done === true;
        return acc;
      }, {})
    };
  });
  return result;
}

function normalizePending(pending) {
  if (!Array.isArray(pending)) return [];
  return pending.map((item, index) => {
    const source = item && typeof item === 'object' ? item : {};
    const type = source.type === 'job' ? 'job' : 'allowance';
    const normalized = {
      ...source,
      id: safeKey(source.id, `pending_${index + 1}`),
      type,
      personId: safeKey(source.personId, 'person'),
      amt: toMoney(source.amt)

    if (source.choreId) normalized.choreId = safeKey(source.choreId, 'task');
    return normalized;
  });
}

function normalizeTodo(todo, index) {

function normalizeActivityEntry(item, index) {
  const source = item && typeof item === 'object' ? item : { message: item };
  const message = cleanText(source.message || source.msg);
  if (!message) return null;
  const parsedDate = source.createdAt ? new Date(source.createdAt) : (source.time ? new Date(source.time) : new Date());
  const validDate = Number.isFinite(parsedDate.getTime()) ? parsedDate : new Date();
  const entry = {
    id: safeKey(source.id, `activity_${index + 1}`),
    type: cleanText(source.type, 'legacy'),
    action: cleanText(source.action, 'note'),
    message,
    msg: message,
    time: cleanText(source.time, formatActivityTime(validDate)),
    createdAt: validDate.toISOString(),
    createdAtMs: Number.isFinite(Number(source.createdAtMs)) ? Number(source.createdAtMs) : validDate.getTime(),
    weekKey: cleanText(source.weekKey, getWeekKey())
  };
  ['actorId', 'personId', 'targetType', 'targetId', 'clientId'].forEach(key => {
    if (source[key]) entry[key] = cleanText(source[key]);
  });
  if (Number.isFinite(Number(source.amount))) entry.amount = Number(source.amount);
  if (source.metadata && typeof source.metadata === 'object' && !Array.isArray(source.metadata)) entry.metadata = deepCopy(source.metadata);
  return entry;
}

function normalizeActivity(activity) {
  if (!Array.isArray(activity)) return [];
  return activity
    .map((item, index) => normalizeActivityEntry(item, index))
    .filter(Boolean)
    .sort((a, b) => b.createdAtMs - a.createdAtMs)
    .slice(0, MAX_ACTIVITY_ITEMS);
}

function freshState() {

    schemaVersion: STATE_SCHEMA_VERSION,
    household: deepCopy(DEFAULT_HOUSEHOLD),
    people: deepCopy(DEFAULT_PEOPLE),

    weekKey:getWeekKey(),

  };
}

function normalizeState(input) {
  const base = freshState();
  const s = (input && typeof input === 'object') ? input : {};
  const settings = normalizeSettings(s);
  const activity = normalizeActivity(Array.isArray(s.activity) ? s.activity : s.logs);
  const metaSource = s.meta && typeof s.meta === 'object' ? s.meta : {};
  const meta = {
    ...base.meta,
    ...metaSource,
    createdAt: cleanText(metaSource.createdAt, base.meta.createdAt),
    createdAtMs: Number.isFinite(Number(metaSource.createdAtMs)) ? Number(metaSource.createdAtMs) : base.meta.createdAtMs,
    updatedAt: cleanText(metaSource.updatedAt, base.meta.updatedAt),
    updatedAtMs: Number.isFinite(Number(metaSource.updatedAtMs)) ? Number(metaSource.updatedAtMs) : base.meta.updatedAtMs,
    updatedBy: cleanText(metaSource.updatedBy, base.meta.updatedBy),
    writeId: cleanText(metaSource.writeId, base.meta.writeId)
  };
  const peopleSource = Array.isArray(s.people) && s.people.length ? s.people : base.people;
  return {
    schemaVersion: STATE_SCHEMA_VERSION,
    household: normalizeHousehold(s.household || base.household),
    people: peopleSource.map((person, index) => normalizePerson(person, index)),
    checked: normalizeChecked(s.checked),
    approved: normalizeApproved(s.approved),
    pending: normalizePending(s.pending),
    activity,
    logs: activity,
    globalTodos: Array.isArray(s.globalTodos) ? s.globalTodos.map(normalizeTodo) : [],
    weekKey: typeof s.weekKey === 'string' ? s.weekKey : getWeekKey(),
    settings,
    dinnerEnabled: settings.dinnerEnabled,
    dinnerMenu: settings.dinnerMenu,
    meta
  };
}

function loadState() {
  try { const r = localStorage.getItem(LOCAL_STATE_KEY); if (r) return normalizeState(JSON.parse(r)); } catch {}
  return freshState();
}

function cacheState(nextState) {
  try { localStorage.setItem(LOCAL_STATE_KEY, JSON.stringify(nextState)); } catch {}
}

function stampStateForSave(nextState, reason = 'manual') {
  const now = new Date();
  const normalized = normalizeState(nextState);
  const writeId = uid('write');
  normalized.meta = {
    ...normalized.meta,
    updatedAt: now.toISOString(),
    updatedAtMs: now.getTime(),
    updatedBy: clientId,
    writeId,
    reason
  };
  normalized.logs = normalized.activity;
  lastLocalWriteId = writeId;
  return normalized;
}

function saveState(reason = 'manual') {
  state = stampStateForSave(state, reason);
  cacheState(state);
  applySyncStatus(firebaseOnline ? 'saving' : 'local');
  if (stateRef && !isLoadingFromCloud) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      stateRef.set(state).then(() => applySyncStatus('synced')).catch(() => applySyncStatus('local'));
    }, 120);
  }
}

function personProgress(p) { const total = p.chores.length; const done = p.chores.filter(c => isChecked(p.id, c.id)).length; return { total, done, pct: total ? Math.round(done / total * 100) : 0 }; }

function createActivityEntry(input) {

function earnedTotal(pid) { const p = state.people.find(x => x.id === pid); if (!p) return 0; let total = isApproved(pid) ? p.weeklyAllowance : 0; p.chores.filter(c => c.type === 'job').forEach(c => { if (isJobApproved(pid,c.id)) total += Number(c.amt) || 0; }); return total; }

function toggleChore(pid,cid) {
  if (isApproved(pid)) { const p = state.people.find(x => x.id === pid); if (p?.chores.find(c => c.id === cid)?.type === 'weekly') return; }
  if (!state.checked[pid]) state.checked[pid] = []; const idx = state.checked[pid].indexOf(cid);
  const p = state.people.find(x => x.id === pid); const c = p?.chores.find(x => x.id === cid);
  if (!p || !c) return;
  
  if (idx === -1) {
    state.checked[pid].push(cid); chimeCheck(); confetti({ particleCount: 35, spread: 45, origin: { y: 0.85 } });
    pushLogTrail(`${p.name} completed: ${c.name}`, { type:'chore', action:'chore.completed', actorId:pid, personId:pid, targetType:'chore', targetId:cid });
  } else {
    state.checked[pid].splice(idx,1);

    state.approved[item.personId].allowance = true;
    if(p) p.streak++;
    pushLogTrail(`Parent approved allowance for ${p?.name || 'family member'}`, { type:'approval', action:'approval.approved', actorId:'parent', personId:item.personId, targetType:'allowance', targetId:itemId, amount:item.amt });
  } else {
    state.approved[item.personId].jobs[item.choreId] = true;
    pushLogTrail(`Parent approved paid task for ${p?.name || 'family member'}`, { type:'approval', action:'approval.approved', actorId:'parent', personId:item.personId, targetType:'job', targetId:item.choreId, amount:item.amt });
  }
  chimeCascade(); state.pending = state.pending.filter(x => x.id !== itemId); saveState('approval.approve'); renderAll();
}
function denyItem(itemId) {
  const item = state.pending.find(x => x.id === itemId); if (!item) return;
  const p = state.people.find(x => x.id === item.personId);
  if (item.type === 'allowance') state.checked[item.personId] = [];
  else if (item.choreId && state.checked[item.personId]) state.checked[item.personId] = state.checked[item.personId].filter(x => x !== item.choreId);
  pushLogTrail(`Parent denied ${item.type} request for ${p?.name || 'family member'}`, { type:'approval', action:'approval.denied', actorId:'parent', personId:item.personId, targetType:item.type, targetId:item.choreId || itemId, amount:item.amt });
  state.pending = state.pending.filter(x => x.id !== itemId); saveState('approval.deny'); renderAll();
}

function updateAllowance(pid,val) {
  const p = state.people.find(x => x.id === pid);
  if(p) {
    p.weeklyAllowance = parseFloat(val) || 0;
    pushLogTrail(`${p.name}'s weekly allowance set to $${p.weeklyAllowance.toFixed(2)}`, { type:'settings', action:'allowance.updated', actorId:'parent', personId:pid, targetType:'person', targetId:pid, amount:p.weeklyAllowance });
  }
  saveState('allowance.update'); renderAll();
}
function selectType(pid,type) { document.getElementById(`btn-weekly-${pid}`)?.classList.toggle('selected', type === 'weekly'); document.getElementById(`btn-job-${pid}`)?.classList.toggle('selected', type === 'job'); }
function getSelectedType(pid) { return document.getElementById(`btn-job-${pid}`)?.classList.contains('selected') ? 'job' : 'weekly'; }
function addChore(pid) {
  const nameEl = document.getElementById(`inp-name-${pid}`), amtEl = document.getElementById(`inp-amt-${pid}`); const name = nameEl.value.trim(); if (!name) return;
  const type = getSelectedType(pid), amt = type === 'job' ? (parseFloat(amtEl.value) || 0) : 0;
  const p = state.people.find(x => x.id === pid);
  if (!p) return;
  const choreId = uid('chore');
  p.chores.push({ id: choreId, name, amt, type });
  pushLogTrail(`Task added for ${p.name}: ${name}`, { type:'chore', action:'chore.created', actorId:'parent', personId:pid, targetType:'chore', targetId:choreId, amount:amt });
  saveState('chore.add'); renderAll();
}
function deleteChore(pid,cid) {
  const p = state.people.find(x => x.id === pid);
  if (!p) return;
  const removed = p.chores.find(c => c.id === cid);
  p.chores = p.chores.filter(c => c.id !== cid);
  if (state.checked[pid]) state.checked[pid] = state.checked[pid].filter(x => x !== cid);
  state.pending = state.pending.filter(x => !(x.personId === pid && x.choreId === cid));
  if (removed) pushLogTrail(`Task removed from ${p.name}: ${removed.name}`, { type:'chore', action:'chore.deleted', actorId:'parent', personId:pid, targetType:'chore', targetId:cid });
  saveState('chore.delete'); renderAll();
}
function undoApproval(pid) {
  if (state.approved[pid]) {
    state.approved[pid].allowance = false;
    const p = state.people.find(x => x.id === pid);
    if(p && p.streak > 0) p.streak--;
    pushLogTrail(`Allowance approval reopened for ${p?.name || 'family member'}`, { type:'approval', action:'approval.reopened', actorId:'parent', personId:pid, targetType:'allowance', targetId:pid });
  }
  saveState('approval.undo'); renderAll();
}
function doReset() {
  const kept = state.people.map(p => ({...p, chores:p.chores.filter(c => c.type === 'weekly')}));
  const activity = state.activity || state.logs || [];
  const dinnerEnabled = state.dinnerEnabled;
  const dinnerMenu = state.dinnerMenu;
  state = {...freshState(), people: kept, activity, logs: activity, settings:{ dinnerEnabled, dinnerMenu }, dinnerEnabled, dinnerMenu};
  pushLogTrail(`New week started.`, { type:'week', action:'week.reset', actorId:'parent', targetType:'week', targetId:state.weekKey });
  saveState('week.reset'); closeModal('reset-modal'); renderAll();
}

// ══════════════════════════════════════════════
// THE WALK-BY VIEW MASTER UNIFIED BUILDER
// ══════════════════════════════════════════════
function renderUnifiedFrontMatrix() {
  let html = '';
  
  // 1. Render Shared Family Tasks
  if(state.globalTodos && state.globalTodos.length > 0) {
    html += `<div class="list-label" style="color:var(--purple);"><span>📌 Shared Family Tasks</span><button class="pill-btn ghost" onclick="clearFinishedTodos()" style="font-size:10px; padding:2px 6px;">Clear Checked</button></div>`;
    state.globalTodos.forEach(todo => {
      html += `<div class="chore-row ${todo.done ? 'done':''}" onclick="toggleGlobalTodo('${todo.id}')"><div class="chk" style="--person:var(--purple);">${todo.done ? '✓':''}</div><div class="chore-name">${escapeHtml(todo.name)}</div><div></div></div>`;
    });
  }

  // 2. Loop Individual Profiles (Priority Children -> Sub Adults Grid Mapping)
  state.people.forEach(p => {
    const active = p.chores.filter(c => !isChecked(p.id, c.id));
    const completed = p.chores.filter(c => isChecked(p.id, c.id));
    const prog = personProgress(p);
    const streakText = p.streak > 0 ? `<span class="p-widget-streak">🔥 ${p.streak} Wk Streak</span>` : '';

    html += `<div class="list-label" style="margin-top:14px; border-bottom: 1px solid var(--border-soft); padding-bottom:4px;">
      <span style="color:var(--text-strong); font-size:16px; font-weight:800;">${escapeHtml(p.emoji)} ${escapeHtml(p.name)} (${prog.done}/${p.chores.length})</span>
      ${streakText}
    </div>`;

    if(p.chores.length === 0) {
      html += `<div style="font-size:13px; color:var(--text); padding:8px 14px;">No chores yet.</div>`;
      return;
    }

    // List remaining obligations first
    active.forEach(c => {
      const isJob = c.type === 'job';
      const actionFn = isJob ? `requestJobApproval('${p.id}','${c.id}')` : `toggleChore('${p.id}','${c.id}')`;
      html += `<div class="chore-row" onclick="${actionFn}"><div class="chk" style="--person:var(--${p.id})"></div><div class="chore-name">${escapeHtml(c.name)}</div><div style="font-size:12px; font-weight:700; color:var(--text)">${isJob ? '$'+c.amt.toFixed(2):'Chore'}</div></div>`;
    });

    // List cleared operations second
    completed.forEach(c => {
      const isJob = c.type === 'job';
      const jpending = state.pending.some(x => x.type === 'job' && x.personId === p.id && x.choreId === c.id);
      const japproved = isJobApproved(p.id, c.id);
      let statusLabel = isJob ? (japproved ? 'Paid' : (jpending ? 'Pending' : 'Done')) : 'Done';
      html += `<div class="chore-row done" onclick="toggleChore('${p.id}','${c.id}')"><div class="chk" style="background:var(--${p.id}); border-color:var(--${p.id})">✓</div><div class="chore-name">${escapeHtml(c.name)}</div><div style="font-size:12px; color:var(--text)">${statusLabel}</div></div>`;
    });
  });

  document.getElementById('unified-master-tracks').innerHTML = html;
}

function renderDetailedChoreManifestPage() {
  document.getElementById('chores-people-container').innerHTML = state.people.map(p => {
    const earned = earnedTotal(p.id);
    return `<div class="card pad" style="border-top:4px solid var(--${p.id})">
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <span style="font-size:24px">${escapeHtml(p.emoji)}</span><span style="font-size:18px; font-weight:800; color:var(--text-strong)">${escapeHtml(p.name)}</span>
        <span style="margin-left:auto; font-size:16px; font-weight:800; color:var(--text-strong)">$${earned.toFixed(2)}</span>
      </div>
      ${p.chores.map(c => {
        const done = isChecked(p.id, c.id); return `<div class="chore-row ${done?'done':''}" onclick="toggleChore('${p.id}','${c.id}')"><div class="chk" style="${done?'background:var(--'+p.id+'); border-color:var(--'+p.id+')':''}">${done?'✓':''}</div><div class="chore-name">${escapeHtml(c.name)}</div><div style="font-size:11px; color:var(--text)">${c.type==='job'?'Paid':'Chore'}</div></div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function renderHistoryLogsView() {
  const container = document.getElementById('history-logs-container'); if(!container) return;
  const activity = state.activity || state.logs || [];
  if(activity.length === 0) { container.innerHTML = `<div class="empty-state">No activity yet.</div>`; return; }
  container.innerHTML = activity.map(l => `<div class="history-manifest-card"><span style="font-size:14px; color:var(--text-strong); font-weight:600;">${escapeHtml(l.message || l.msg)}</span><span style="font-size:12px; color:var(--text); font-weight:600;">${escapeHtml(l.time)}</span></div>`).join('');
}

function renderApprovalsView() {
  const container = document.getElementById('approvals-container'); if (state.pending.length === 0) { container.innerHTML = `<div class="empty-state">No approvals waiting.</div>`; return; }
  container.innerHTML = `<div class="approval-list">${state.pending.map(item => {
    const p = state.people.find(x => x.id === item.personId) || {emoji:'•', name:'User'};
    return `<div class="approval-item"><span style="font-size:22px">${escapeHtml(p.emoji)}</span><div><div style="font-weight:800; color:var(--text-strong)">${escapeHtml(p.name)}</div><div style="font-size:12px">${item.type==='allowance'?'Weekly allowance':'Paid task'}</div></div><div style="margin-left:auto; display:flex; gap:8px;"><button class="pill-btn danger" onclick="denyItem('${item.id}')">Deny</button><button class="pill-btn primary" onclick="approveItem('${item.id}')">Approve</button></div></div>`;
  }).join('')}</div>`;
}

function renderManageView() {
  document.getElementById('manage-grid').innerHTML = state.people.map(person => {
    return `<div class="card pad">
      <div style="font-weight:800; font-size:15px; color:var(--text-strong); margin-bottom:10px;">${escapeHtml(person.name)}</div>
      <div class="field-row"><label>Weekly Allowance ($)</label><input class="inp" type="number" min="0" step="0.5" value="${person.weeklyAllowance.toFixed(2)}" onchange="updateAllowance('${person.id}',this.value)" /></div>
      ${person.chores.map(c => `<div class="manage-chore-row"><span style="font-size:13px">${escapeHtml(c.name)}</span><button class="del-btn" onclick="deleteChore('${person.id}','${c.id}')">×</button></div>`).join('')}
      <div class="add-form"><input class="inp" id="inp-name-${person.id}" placeholder="New chore or task" /><div style="display:flex; gap:6px;"><input class="inp" id="inp-amt-${person.id}" type="number" placeholder="$" style="width:70px;" /><div class="type-row" style="flex:1;"><button class="type-btn selected" id="btn-weekly-${person.id}" onclick="selectType('${person.id}','weekly')">Chore</button><button class="type-btn" id="btn-job-${person.id}" onclick="selectType('${person.id}','job')">Paid</button></div></div><button class="add-btn" onclick="addChore('${person.id}')">Add Task</button></div>
    </div>`;
  }).join('');
  document.getElementById('toggle-dinner-feature').checked = state.dinnerEnabled; document.getElementById('manage-dinner-box').style.display = state.dinnerEnabled ? 'block' : 'none'; document.getElementById('dinner-input').value = state.dinnerMenu;
}

function updateSystemCounters() {
  const total = state.people.reduce((sum,p) => sum + p.chores.length, 0), done = state.people.reduce((sum,p) => sum + p.chores.filter(c => isChecked(p.id,c.id)).length, 0);
  const apprBadge = document.getElementById('appr-badge'); if(apprBadge) { apprBadge.style.display = pendingCount() > 0 ? 'inline-flex' : 'none'; apprBadge.textContent = pendingCount(); }
  document.getElementById('stats-total-value').textContent = `${done}/${total}`; document.getElementById('stats-pending-value').textContent = pendingCount();
  const weekEl = document.getElementById('stats-week-value'); if (weekEl) weekEl.textContent = String(state.weekKey || getWeekKey()).split('_').pop().replace('w', '');
  
  const dinnerBanner = document.getElementById('home-dinner-card');
  if(state.dinnerEnabled && state.dinnerMenu) { dinnerBanner.style.display = 'block'; document.getElementById('home-dinner-text').textContent = state.dinnerMenu; } else { dinnerBanner.style.display = 'none'; }
}

function renderAll() {
  state = normalizeState(state); renderUnifiedFrontMatrix(); renderDetailedChoreManifestPage(); renderHistoryLogsView(); renderApprovalsView(); renderManageView(); updateSystemCounters(); processSystemBanners();
}

// ══════════════════════════════════════════════
// SWITCH INTERFACES & PLATFORM ROUTERS
// ══════════════════════════════════════════════
let manageUnlocked = false;
function switchTab(name) {
  if (name === 'manage' && !manageUnlocked) { requirePin('manage'); return; }
  document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', ['home','chores','approvals','history','manage'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
  if (name === 'home') renderUnifiedFrontMatrix(); if (name === 'chores') renderDetailedChoreManifestPage(); if (name === 'history') renderHistoryLogsView(); if (name === 'approvals') renderApprovalsView(); if (name === 'manage') renderManageView();
}
function setupCalendar() { document.getElementById('cal-agenda').src = GOOGLE_CAL_URL + '&mode=AGENDA&showTitle=0&showPrint=0&showCalendars=0&showTabs=0&showTz=0&wkst=1&bgcolor=%230b0f19'; }
function updateClock() {
  const now = new Date(), h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0'); document.getElementById('clock').textContent = `${h%12||12}:${m}`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'], months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date').textContent = `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}`;
}

let pinBuffer = '', pinAction = null;
function requirePin(action) { pinAction = action; pinBuffer = ''; updatePinDots(); document.getElementById('pin-error').textContent = ''; document.getElementById('pin-modal').classList.add('open'); }
function pinKey(k) { if (k === 'cancel') { closeModal('pin-modal'); return; } if (k === 'back') { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); return; } if (pinBuffer.length >= 4) return; pinBuffer += k; updatePinDots(); if (pinBuffer.length === 4) setTimeout(checkPin, 120); }
function updatePinDots() { for (let i=0;i<4;i++) document.getElementById(`pd${i}`).classList.toggle('filled', i < pinBuffer.length); }
function checkPin() { if (pinBuffer === PARENT_PIN) { closeModal('pin-modal'); if (pinAction === 'reset') document.getElementById('reset-modal').classList.add('open'); if (pinAction === 'manage') { manageUnlocked = true; switchTab('manage'); } } else { document.getElementById('pin-error').textContent = 'Wrong PIN.'; pinBuffer = ''; updatePinDots(); } }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function resetAmbientTimer() {}

function applyRemoteState(remoteState) {
  isLoadingFromCloud = true;
  state = normalizeState(remoteState);
  cacheState(state);
  renderAll();
  isLoadingFromCloud = false;
  applySyncStatus('synced');
}

function seedCloudState() {
  state = stampStateForSave(state, 'cloud.seed');
  cacheState(state);
  applySyncStatus('seeding');
  stateRef.transaction(current => current || state).then(result => {
    hasLoadedCloudOnce = true;
    applyRemoteState(result.snapshot.val() || state);
  }).catch(() => applySyncStatus('local'));
}

function startCloudSync() {
  if (!stateRef) { applySyncStatus('local'); return; }
  if (connectedRef) {
    connectedRef.on('value', snapshot => {
      firebaseOnline = snapshot.val() === true;
      if (!firebaseOnline) applySyncStatus('local');
      else if (hasLoadedCloudOnce) applySyncStatus('synced');
    });
  }
  stateRef.on('value', snapshot => {
    const cloudState = snapshot.val();
    if (!cloudState) {
      if (!hasLoadedCloudOnce) seedCloudState();
      else applySyncStatus('local');
      return;
    }
    hasLoadedCloudOnce = true;
    if (cloudState.meta?.writeId === lastLocalWriteId) lastLocalWriteId = null;
    applyRemoteState(cloudState);
  }, () => applySyncStatus('local'));
}

setupCalendar(); updateClock(); setInterval(updateClock, 15000); renderAll(); startCloudSync(); resetAmbientTimer(); setTimeout(processSystemBanners, 1000);
</script>
