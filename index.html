<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Deutmeyer Family Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<!-- Canvas Confetti Library for Celebrations -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --bg: #f8fafc;
  --app: #ffffff;
  --card: rgba(255, 255, 255, 0.95);
  --card-soft: #f1f5f9;
  --text: #475569;
  --text-strong: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --border-soft: #f1f5f9;
  --blue: #0284c7;
  --blue-soft: #e0f2fe;
  --green: #16a34a;
  --green-soft: #dcfce7;
  --amber: #d97706;
  --amber-soft: #fef3c7;
  --red: #dc2626;
  --red-soft: #fee2e2;
  --purple: #7c3aed;
  --purple-soft: #f3e8fd;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.02), 0 2px 4px -1px rgba(0,0,0,0.02);
  --radius: 20px;
  --radius-sm: 14px;
  --dad: #16a34a;
  --mom: #dc2626;
  --jules: #0284c7;
  --henry: #ea580c;
  --cal-filter: none;
}

body.theme-focus {
  --bg: #05070f;
  --app: #090d16;
  --card: rgba(17, 24, 39, 0.8);
  --card-soft: rgba(31, 41, 55, 0.5);
  --text: #94a3b8;
  --text-strong: #f8fafc;
  --muted: #4b5563;
  --border: rgba(255, 255, 255, 0.05);
  --border-soft: rgba(255, 255, 255, 0.02);
  --blue: #38bdf8;
  --blue-soft: rgba(56, 189, 248, 0.12);
  --green: #4ade80;
  --green-soft: rgba(74, 222, 128, 0.12);
  --amber: #fbbf24;
  --amber-soft: rgba(251, 191, 36, 0.12);
  --red: #f87171;
  --red-soft: rgba(248, 113, 113, 0.12);
  --purple: #c084fc;
  --purple-soft: rgba(192, 132, 252, 0.12);
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  --cal-filter: invert(0.92) hue-rotate(180deg) contrast(1.2);
}

* { box-sizing: border-box; touch-action: manipulation; user-select: none; }
html, body { height: 100vh; overflow: hidden; margin: 0; }
body {
  font-family: 'Plus Jakarta Sans', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* Ambient Saver Screen styling */
#ambient-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #010204;
  z-index: 9999;
  color: #ffffff;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#ambient-time { font-size: 130px; font-weight: 800; letter-spacing: -0.05em; color: #ffffff; }
#ambient-date { font-size: 28px; color: #475569; font-weight: 600; margin-top: 10px; }

/* Fixed Fullscreen Framework Layout (Eliminates All Scrolling) */
.app-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 0 12px;
  background: var(--app);
}

.topbar {
  padding: 14px 8px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.eyebrow { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
.status-dot { width: 8px; height: 8px; border-radius: 99px; background: var(--green); box-shadow: 0 0 10px var(--green); }
.status-dot.offline { background: var(--amber); box-shadow: 0 0 10px var(--amber); }
.main-title-headline { margin: 0; color: var(--text-strong); font-size: 22px; font-weight: 800; letter-spacing: -0.03em; }

.dock-container { display: inline-flex; background: var(--card-soft); border: 1px solid var(--border); padding: 4px; border-radius: 14px; gap: 4px; }
.nav-tab {
  appearance: none; border: none; background: transparent; color: var(--text); border-radius: 10px;
  padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s ease;
}
.nav-tab.active { background: var(--app); color: var(--blue); box-shadow: var(--shadow); }
.time-block { text-align: right; line-height: 1.1; }
#clock { color: var(--text-strong); font-size: 24px; font-weight: 800; }
#date { color: var(--muted); font-size: 11px; font-weight: 600; }

.content { flex: 1; min-height: 0; padding: 12px 0 16px; position: relative; }
.panel { display: none; height: 100%; }
.panel.active { display: flex; flex-direction: column; }

/* Today Tab 2-Column Split View Grid */
.today-split-layout {
  display: grid;
  grid-template-columns: 1fr;
  height: 100%;
  gap: 16px;
}
@media (min-width: 768px) {
  .today-split-layout { grid-template-columns: 0.95fr 1.05fr; }
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.card-header-main { padding: 12px 16px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.card-main-title { font-size: 15px; font-weight: 800; color: var(--text-strong); }

/* Left Column: Calendar Container Box */
.calendar-frame-wrap { flex: 1; min-height: 0; background: var(--app); position: relative; }
.calendar-frame-wrap iframe { width: 100%; height: 100%; border: 0; filter: var(--cal-filter); }

/* Right Column: Combined Dynamic Chore Stream */
.main-tracking-core { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.scroll-payload-box { flex: 1; min-height: 0; overflow-y: auto; padding-right: 4px; }

/* Global Stats Mini Indicators Bar */
.quick-stats-stack { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; flex-shrink: 0; }
.stat-mini { background: var(--card-soft); padding: 10px 6px; border-radius: var(--radius-sm); border: 1px solid var(--border-soft); text-align: center; }
.stat-m-label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; }
.stat-m-val { font-size: 18px; font-weight: 800; color: var(--text-strong); margin-top: 2px; }

/* Interactive Arcade Rows layout */
.chore-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 12px;
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  min-height: 48px;
  background: var(--card-soft);
  margin-bottom: 6px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.chore-row:hover { border-color: var(--border); background: var(--card); }
.chore-row.done { opacity: 0.35; }
.chore-row.done .chore-name { text-decoration: line-through; }

.chk {
  width: 24px;
  height: 24px;
  border-radius: 8px;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: white;
  background: rgba(0,0,0,0.02);
}
.chore-row.done .chk { background: var(--person, var(--blue)); border-color: var(--person, var(--blue)); }
.chore-name { font-size: 14px; font-weight: 600; color: var(--text-strong); }

.list-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: 0.08em; padding: 10px 4px 6px; display: flex; align-items: center; justify-content: space-between; }
.p-widget-streak { font-size: 10px; background: linear-gradient(135deg, #ff9800, #ff5722); color: #ffffff; padding: 2px 8px; border-radius: 6px; font-weight: 800; margin-left: auto; }

/* FLOATING OVERLAY FLY INJECTION SYSTEM (Saves Valuable Layout Real Estate) */
.floating-add-btn {
  position: absolute; right: 16px; bottom: 16px; width: 52px; height: 52px; border-radius: 99px;
  background: var(--blue); color: white; border: none; font-size: 24px; font-weight: 700;
  box-shadow: 0 10px 20px rgba(2, 132, 199, 0.3); z-index: 100;
}
.on-the-fly-overlay {
  display: none; position: absolute; inset: 0; background: rgba(5,7,15,0.4);
  backdrop-filter: blur(12px); z-index: 90; align-items: center; justify-content: center; padding: 16px;
}
.on-the-fly-overlay.open { display: flex; }
.overlay-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); width: 100%; max-width: 400px; box-shadow: var(--shadow-soft); }

/* Other tab page system scroll frames */
.panel-scroll-frame { flex: 1; min-height: 0; overflow-y: auto; padding-right: 4px; }
.person-grid-chores { display: grid; grid-template-columns: 1fr; gap: 16px; }
@media(min-width: 768px) { .person-grid-chores { grid-template-columns: repeat(2, 1fr); } }

.approval-list { display: grid; gap: 10px; }
.approval-item { background: var(--card); border: 1px solid var(--border); padding: 16px; border-radius: var(--radius); display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center; }
.manage-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
@media(min-width: 768px) { .manage-grid { grid-template-columns: repeat(2, 1fr); } }

.field-row { display: grid; grid-template-columns: 1fr 100px; gap: 10px; align-items: center; padding-bottom: 10px; border-bottom: 1px solid var(--border-soft); margin-bottom: 10px; }
.inp { border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 10px; padding: 10px; font-size: 14px; outline: none; width: 100%; }
.add-form { margin-top: 12px; background: var(--card-soft); padding: 10px; border-radius: var(--radius-sm); display: grid; gap: 8px; }
.type-row { display: flex; gap: 8px; }
.type-btn { flex: 1; border: 1px solid var(--border); background: var(--card); color: var(--muted); padding: 8px; border-radius: 8px; font-weight: 700; font-size: 12px; }
.type-btn.selected { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
.add-btn { border: none; background: var(--text-strong); color: var(--app); border-radius: 8px; padding: 10px; font-weight: 700; font-size: 13px; }
.del-btn { border: none; background: var(--red-soft); color: var(--red); width: 28px; height: 28px; border-radius: 6px; font-weight: 700; }
.manage-chore-row { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-soft); }

.modal-bg { display:none; position:fixed; inset:0; background:rgba(15,23,42,.7); backdrop-filter: blur(16px); z-index:200; align-items:center; justify-content:center; padding: 20px; }
.modal-bg.open { display:flex; }
.modal { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:24px; width:340px; text-align: center; }
.pin-dots { display:flex; justify-content:center; gap:12px; margin:20px 0; }
.pin-dot { width:14px; height:14px; border-radius:99px; background:var(--border); }
.pin-dot.filled { background:var(--blue); box-shadow: 0 0 10px var(--blue); }
.pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:220px; margin:0 auto; }
.pin-key { border:1px solid var(--border); background:var(--card-soft); color:var(--text-strong); border-radius:14px; padding:14px; font-size:20px; font-weight:700; }
.pin-error { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 18px; font-weight: 600; }

.toast { display:none; position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); z-index: 250; background: var(--text-strong); color: var(--app); border-radius: 99px; padding: 12px 24px; box-shadow: var(--shadow-soft); font-weight: 700; font-size: 13px; }
.toast.show { display:block; animation: toastIn .2s ease; }
@keyframes toastIn { from { transform: translate(-50%, 15px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

.progress-inline-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 6px; }
.progress-inline-fill { height: 100%; background: var(--person); width: 0%; transition: width 0.4s ease; }
.badge { min-width: 16px; height: 16px; border-radius: 99px; background: var(--red); color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; }
.dinner-title { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--purple); letter-spacing: 0.1em; margin-bottom: 2px;}
.pill-btn { border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 10px; padding: 8px 14px; font-size: 12px; font-weight: 700; }
.pill-btn.primary { background: var(--blue); color: white; border-color: var(--blue); }
.pill-btn.danger { background: var(--red-soft); color: var(--red); border-color: var(--red); }
.footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; flex-shrink: 0; }
</style>
</head>

function getWeekKey() {
  const d = new Date(), jan1 = new Date(d.getFullYear(),0,1);
  return `w${d.getFullYear()}_${Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7)}`;
}
function deepCopy(v) { return JSON.parse(JSON.stringify(v)); }
function freshState() { return { people: deepCopy(DEFAULT_PEOPLE), checked:{}, approved:{}, pending:[], globalTodos:[], weekKey:getWeekKey(), theme:'focus', dinnerEnabled: false, dinnerMenu: '' }; }

function normalizeState(input) {
  const base = freshState(); const s = (input && typeof input === 'object') ? input : {};
  const normalized = {
    people: Array.isArray(s.people) && s.people.length ? s.people : base.people,
    checked: s.checked && typeof s.checked === 'object' && !Array.isArray(s.checked) ? s.checked : {},
    approved: s.approved && typeof s.approved === 'object' && !Array.isArray(s.approved) ? s.approved : {},
    pending: Array.isArray(s.pending) ? s.pending : [],
    globalTodos: Array.isArray(s.globalTodos) ? s.globalTodos : [],
    weekKey: typeof s.weekKey === 'string' ? s.weekKey : getWeekKey(),
    theme: s.theme === 'classic' ? 'classic' : 'focus',
    dinnerEnabled: typeof s.dinnerEnabled === 'boolean' ? s.dinnerEnabled : base.dinnerEnabled,
    dinnerMenu: typeof s.dinnerMenu === 'string' ? s.dinnerMenu : base.dinnerMenu
  };
  normalized.people = normalized.people.map((p, index) => ({
    id: p.id || base.people[index]?.id || uid(),
    name: p.name || base.people[index]?.name || 'Person',
    emoji: p.emoji || base.people[index]?.emoji || '•',
    cls: p.cls || base.people[index]?.cls || 'card-dad',
    age: p.age || '',
    weeklyAllowance: Number(p.weeklyAllowance) || 0,
    streak: Number(p.streak) || 0,
    chores: Array.isArray(p.chores) ? p.chores.map(c => ({
      id: c.id || uid(), name: c.name || 'Untitled', type: c.type === 'job' ? 'job' : 'weekly', amt: Number(c.amt) || 0
    })) : []
  }));
  return normalized;
}

function loadState() {
  try { const r = localStorage.getItem('fb_v9'); if (r) return normalizeState(JSON.parse(r)); } catch {}
  return freshState();
}
function saveState() {
  state = normalizeState(state); try { localStorage.setItem('fb_v9', JSON.stringify(state)); } catch {}
  applySyncStatus(firebaseOnline ? 'saving' : 'local');
  if (stateRef && !isLoadingFromCloud) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      stateRef.set(state).then(() => applySyncStatus('synced')).catch(() => applySyncStatus('local'));
    }, 120);
  }
}

function uid() { return Math.random().toString(36).substr(2,9); }
function isChecked(pid,cid) { return (state.checked[pid] || []).includes(cid); }
function isApproved(pid) { return state.approved[pid]?.allowance === true; }
function isJobApproved(pid,cid) { return state.approved[pid]?.jobs?.[cid] === true; }
function fmt(n) { return Number(n) === 0 ? '—' : '$' + Number(n).toFixed(2); }
function allWeeklyDone(pid) {
  const p = state.people.find(x => x.id === pid); const weekly = p ? p.chores.filter(c => c.type === 'weekly') : [];
  return weekly.length > 0 && weekly.every(c => isChecked(pid, c.id));
}
function earnedTotal(pid) {
  const p = state.people.find(x => x.id === pid); if (!p) return 0;
  let total = isApproved(pid) ? p.weeklyAllowance : 0;
  p.chores.filter(c => c.type === 'job').forEach(c => { if (isJobApproved(pid,c.id)) total += Number(c.amt) || 0; });
  return total;
}
function pendingCount() { return state.pending.length; }
function personProgress(p) {
  const total = p.chores.length; const done = p.chores.filter(c => isChecked(p.id, c.id)).length;
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
}

  dot.className = 'status-dot' + (mode !== 'synced' && mode !== 'saving' ? ' offline' : '');

}

function toggleChore(pid,cid) {
  if (isApproved(pid)) {
    const p = state.people.find(x => x.id === pid); if (p?.chores.find(c => c.id === cid)?.type === 'weekly') return;
  }
  if (!state.checked[pid]) state.checked[pid] = [];
  const idx = state.checked[pid].indexOf(cid);
  if (idx === -1) {
    state.checked[pid].push(cid); playSuccessChime(); confetti({ particleCount: 40, spread: 45, origin: { y: 0.85 } });
  } else {
    state.checked[pid].splice(idx,1);
  }

  const p = state.people.find(x => x.id === pid);
  if (allWeeklyDone(pid) && p.weeklyAllowance > 0 && !isApproved(pid)) {
    if (!state.pending.some(x => x.type === 'allowance' && x.personId === pid)) {
      state.pending.push({ id: uid(), type: 'allowance', personId: pid, amt: p.weeklyAllowance });
      showToast(`${p.name} completed their tracks! 🎉`); confetti({ particleCount: 180, spread: 90, origin: { y: 0.5 } });
    }
  }
  saveState(); renderAll(); updateBadge();
}

function closeOnTheFlyOverlay(e) { if(e.target.id === 'fast-task-overlay') e.target.classList.remove('open'); }

function injectTaskOnTheFly() {

  }

function saveDinnerMenu() { state.dinnerMenu = document.getElementById('dinner-input').value.trim(); saveState(); renderAll(); showToast('Broadcast Synced! 🍽️'); }

function requestJobApproval(pid,cid) {
  const p = state.people.find(x => x.id === pid); const c = p?.chores.find(x => x.id === cid); if (!c || isJobApproved(pid,cid)) return;
  if (!isChecked(pid,cid)) { toggleChore(pid,cid); return; }
  if (state.pending.some(x => x.type === 'job' && x.personId === pid && x.choreId === cid)) return;
  state.pending.push({ id: uid(), type: 'job', personId: pid, choreId: cid, amt: c.amt, name: c.name });
  saveState(); renderAll(); updateBadge();
}

function approveItem(itemId) {
  const item = state.pending.find(x => x.id === itemId); if (!item) return;
  if (!state.approved[item.personId]) state.approved[item.personId] = { jobs:{} };
  if (item.type === 'allowance') {
    state.approved[item.personId].allowance = true;
    const p = state.people.find(x => x.id === item.personId); if(p) p.streak = (p.streak || 0) + 1;
  } else {
    state.approved[item.personId].jobs[item.choreId] = true;
  }
  playApprovalCascade(); state.pending = state.pending.filter(x => x.id !== itemId); saveState(); renderAll(); updateBadge(); showToast('Approved.');
}

function denyItem(itemId) {
  const item = state.pending.find(x => x.id === itemId); if (!item) return;
  if (item.type === 'allowance') state.checked[item.personId] = [];
  else if (item.choreId && state.checked[item.personId]) state.checked[item.personId] = state.checked[item.personId].filter(x => x !== item.choreId);
  state.pending = state.pending.filter(x => x.id !== itemId); saveState(); renderAll(); updateBadge();
}

function updateAllowance(pid,val) { const p = state.people.find(x => x.id === pid); if(p) p.weeklyAllowance = parseFloat(val) || 0; saveState(); renderAll(); }
function selectType(pid,type) { document.getElementById(`btn-weekly-${pid}`)?.classList.toggle('selected', type === 'weekly'); document.getElementById(`btn-job-${pid}`)?.classList.toggle('selected', type === 'job'); }
function getSelectedType(pid) { return document.getElementById(`btn-job-${pid}`)?.classList.contains('selected') ? 'job' : 'weekly'; }

function addChore(pid) {
  const nameEl = document.getElementById(`inp-name-${pid}`), amtEl = document.getElementById(`inp-amt-${pid}`); const name = nameEl.value.trim(); if (!name) return;
  const type = getSelectedType(pid), amt = type === 'job' ? (parseFloat(amtEl.value) || 0) : 0;
  state.people.find(x => x.id === pid).chores.push({ id: uid(), name, amt, type }); saveState(); renderAll();
}
function deleteChore(pid,cid) {
  const p = state.people.find(x => x.id === pid); p.chores = p.chores.filter(c => c.id !== cid);
  if (state.checked[pid]) state.checked[pid] = state.checked[pid].filter(x => x !== cid);
  state.pending = state.pending.filter(x => !(x.personId === pid && x.choreId === cid)); saveState(); renderAll(); updateBadge();
}
function undoApproval(pid) { if (state.approved[pid]) { state.approved[pid].allowance = false; const p = state.people.find(x => x.id === pid); if(p && p.streak > 0) p.streak--; } saveState(); renderAll(); }
function doReset() {
  const kept = state.people.map(p => ({...p, chores:p.chores.filter(c => c.type === 'weekly')}));
  state = {...freshState(), people: kept, theme: state.theme || 'focus', dinnerEnabled: state.dinnerEnabled, dinnerMenu: state.dinnerMenu};

function renderPersonCard(person, compact=false) {
  const weekly = person.chores.filter(c => c.type === 'weekly'), jobs = person.chores.filter(c => c.type === 'job');
  const approved = isApproved(person.id), pendingAllowance = state.pending.some(x => x.type === 'allowance' && x.personId === person.id);
  const earned = earnedTotal(person.id);

  let statusHtml = '';
  if (person.weeklyAllowance > 0) {
    if (approved) statusHtml = `<div class="status-card paid"><div class="status-icon">✓</div><div class="status-main"><strong>Disbursed</strong></div><button class="pill-btn" onclick="requirePin('unapprove','${person.id}')">Rollback</button></div>`;
    else if (pendingAllowance) statusHtml = `<div class="status-card pending"><div class="status-icon">•</div><div class="status-main"><strong>Awaiting Signoff</strong></div></div>`;
  }

  const weeklyHtml = `${weekly.map(c => {
    const done = isChecked(person.id,c.id), locked = approved && done;
    return `<div class="chore-row ${done?'done':''}" onclick="${locked ? '' : `toggleChore('${person.id}','${c.id}')`}"><div class="chk" style="--person:var(--${person.id})">${done?'✓':''}</div><div class="chore-name">${c.name}</div><div></div></div>`;
  }).join('')}`;

  const jobsHtml = `${jobs.map(c => {
    const checked = isChecked(person.id,c.id), jpending = state.pending.some(x => x.type === 'job' && x.personId === person.id && x.choreId === c.id), japproved = isJobApproved(person.id,c.id);
    let amtLabel = japproved ? `<span class="job-amt paid-out">$${c.amt.toFixed(2)}</span>` : jpending ? `<span class="job-amt pending-pay">Signoff</span>` : `<span class="job-amt">$${c.amt.toFixed(2)}</span>`;
    const clickFn = checked && !jpending && !japproved ? `requestJobApproval('${person.id}','${c.id}')` : (!checked ? `toggleChore('${person.id}','${c.id}')` : '');
    return `<div class="chore-row ${checked?'done':''}" onclick="${clickFn}"><div class="chk" style="--person:var(--${person.id})">${checked?'✓':''}</div><div class="chore-name">${c.name}</div>${amtLabel}</div>`;
  }).join('')}`;

  return `<div class="card pad" style="border-top: 4px solid var(--${person.id})">
    <div style="display:flex; align-items:center; gap:14px; margin-bottom:12px;">
      <div class="avatar" style="font-size:26px">${person.emoji}</div>
      <div><div class="p-widget-name" style="font-size:16px">${person.name}</div></div>
      <div style="margin-left:auto; text-align:right"><div style="font-size:18px; font-weight:800; color:var(--text-strong)">${fmt(earned)}</div></div>
    </div>
    ${statusHtml}
    <div class="list-label">Core Tracks</div>${weeklyHtml}
    ${jobs.length ? '<div class="list-label" style="margin-top:10px">Premium Track</div>' : ''}${jobsHtml}
  </div>`;
}

// THE ZERO SCROLL PRIORITY TRACK RENDER TREE
function renderUnifiedFrontMatrix() {
  let html = '';
  
  // 1. PIN Shared Global Tasks First
  if(state.globalTodos && state.globalTodos.length > 0) {
    html += `<div class="list-label" style="color:var(--purple);"><span>📌 Shared Family Tasks</span><button class="pill-btn ghost" onclick="clearFinishedTodos()" style="font-size:10px; padding:2px 6px;">Clear Checked</button></div>`;
    state.globalTodos.forEach(todo => {
      html += `<div class="chore-row ${todo.done ? 'done':''}" onclick="toggleGlobalTodo('${todo.id}')"><div class="chk" style="--person:var(--purple);">${todo.done ? '✓':''}</div><div class="chore-name">${todo.name}</div><div></div></div>`;
    });
  }

  // 2. PRIORITY: Loop Kids side-by-side / sequentially next higher status mapping
  const kids = state.people.filter(p => p.weeklyAllowance > 0);
  kids.forEach(p => {
    const active = p.chores.filter(c => !isChecked(p.id, c.id));
    const completed = p.chores.filter(c => isChecked(p.id, c.id));
    const streakText = p.streak > 0 ? `<span class="p-widget-streak">🔥 ${p.streak} Wk</span>` : '';

    html += `<div class="list-label" style="margin-top:10px;"><span style="color:var(--text-strong); font-weight:800;">${p.emoji} ${p.name}'s Loop</span>${streakText}</div>`;
    
    active.forEach(c => {
      html += `<div class="chore-row" onclick="toggleChore('${p.id}','${c.id}')"><div class="chk" style="--person:var(--${p.id})"></div><div class="chore-name">${c.name}</div><div style="font-size:10px; color:var(--muted); font-weight:700;">${c.type==='job'?'Premium':'Core'}</div></div>`;
    });
    completed.forEach(c => {
      html += `<div class="chore-row done" onclick="toggleChore('${p.id}','${c.id}')"><div class="chk" style="background:var(--${p.id}); border-color:var(--${p.id})">✓</div><div class="chore-name">${c.name}</div><div></div></div>`;
    });
  });

  // 3. UNDERTIER: Adults Consolidated Space Efficient Cards at bottom layers
  const adults = state.people.filter(p => p.weeklyAllowance === 0);
  adults.forEach(p => {
    const active = p.chores.filter(c => !isChecked(p.id, c.id));
    if(active.length > 0) {
      html += `<div class="list-label" style="opacity:0.6; margin-top:10px;"><span style="font-weight:700;">${p.emoji} ${p.name}'s Core Tasks</span></div>`;
      active.forEach(c => {
        html += `<div class="chore-row" onclick="toggleChore('${p.id}','${c.id}')" style="min-height:40px; padding:8px 12px;"><div class="chk" style="--person:var(--${p.id})"></div><div class="chore-name" style="font-size:13px">${c.name}</div><div></div></div>`;
      });
    }
  });

  document.getElementById('unified-master-tracks').innerHTML = html;
}

// ══════════════════════════════════════════════
// ROUTING MATRIX LOGIC
// ══════════════════════════════════════════════
let manageUnlocked = false;
function switchTab(name) {
  if (name === 'manage' && !manageUnlocked) { requirePin('manage'); return; }
  document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', ['home','chores','approvals','calendar','manage'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
  if (name === 'home') renderUnifiedFrontMatrix(); if (name === 'approvals') renderApprovals(); if (name === 'manage') renderManage();
}
function toggleTheme() { state.theme = state.theme === 'classic' ? 'focus' : 'classic'; saveState(); applyTheme(); }
function applyTheme() {
  document.body.className = state.theme !== 'classic' ? 'theme-focus' : '';
  document.getElementById('theme-btn').textContent = state.theme === 'classic' ? 'Light' : 'Dark';
}
function setupCalendar() {
  document.getElementById('cal-agenda').src = GOOGLE_CAL_URL + '&mode=AGENDA&showTitle=0&showPrint=0&showCalendars=0&showTabs=0&showTz=0&wkst=1&bgcolor=%23ffffff';
  document.getElementById('cal-full').src = GOOGLE_CAL_URL + '&mode=WEEK&showTitle=0&showPrint=0&showCalendars=0&showTabs=0&showTz=0&wkst=1&bgcolor=%23ffffff';
}
function updateClock() {
  const now = new Date(), h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h%12||12}:${m}`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'], months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
  updateAmbientClock();
}

let pinBuffer = '', pinAction = null, pinMeta = null;
function requirePin(action, meta) {
  pinAction = action; pinMeta = meta; pinBuffer = ''; updatePinDots(); document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-modal').classList.add('open');
}
function pinKey(k) {
  if (k === 'cancel') { closeModal('pin-modal'); return; } if (k === 'back') { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); return; }
  if (pinBuffer.length >= 4) return; pinBuffer += k; updatePinDots(); if (pinBuffer.length === 4) setTimeout(checkPin, 120);
}
function updatePinDots() { for (let i=0;i<4;i++) document.getElementById(`pd${i}`).classList.toggle('filled', i < pinBuffer.length); }
function checkPin() {
  if (pinBuffer === PARENT_PIN) {
    closeModal('pin-modal');
    if (pinAction === 'reset') document.getElementById('reset-modal').classList.add('open');
    if (pinAction === 'unapprove') undoApproval(pinMeta);
    if (pinAction === 'manage') { manageUnlocked = true; switchTab('manage'); }
  } else {
    document.getElementById('pin-error').textContent = 'Clearance failure.'; pinBuffer = ''; updatePinDots();
  }
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function startCloudSync() {
  if (!stateRef) { applySyncStatus('local'); return; }
  stateRef.on('value', snapshot => {
    const cloudState = snapshot.val(); if (!cloudState && !hasLoadedCloudOnce) { hasLoadedCloudOnce = true; saveState(); return; }
    if (cloudState) { hasLoadedCloudOnce = true; isLoadingFromCloud = true; state = normalizeState(cloudState); renderAll(); isLoadingFromCloud = false; applySyncStatus('synced'); }
  }, () => applySyncStatus('local'));
}

setupCalendar(); updateClock(); setInterval(updateClock, 15000); renderAll(); startCloudSync(); resetAmbientTimer();
</script>
</body>
</html>
